<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Akuse Methodist SHTS Mathematics Assessment Portal</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script src="https://unpkg.com/mathlive"></script>
<script src="./app-config.js"></script>
<style>
:root{
  --navy:#071f3d;
  --navy2:#0d315f;
  --gold:#f4c430;
  --green:#0f7b4f;
  --red:#d92d20;
  --ink:#101828;
  --muted:#667085;
  --line:#d9e7f3;
  --bg:#eef5fb;
  --white:#fff;
  --shadow:0 14px 36px rgba(7,31,61,.12);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--ink);background:var(--bg);overflow-x:hidden}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.bg{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(244,196,48,.23), transparent 32%),
    radial-gradient(circle at 90% 20%, rgba(13,49,95,.18), transparent 28%),
    linear-gradient(180deg,#f8fbff,#eaf2fb);
}
.topStatus{
  position:fixed;right:12px;top:10px;z-index:2000;
  padding:7px 11px;border-radius:999px;border:1px solid var(--line);
  background:#fff;color:var(--navy);font-size:12px;font-weight:900;box-shadow:var(--shadow)
}
.topStatus.live{background:#ecfdf3;color:#0f6b47;border-color:#bce8ce}
.topStatus.warn{background:#fff7d1;color:#6b5300;border-color:#efd36b}
.topStatus.bad{background:#fff1f0;color:#b42318;border-color:#ffd4d0}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  min-height:42px;padding:10px 14px;border-radius:13px;border:0;
  font-weight:900;line-height:1.2;white-space:normal;text-align:center
}
.btn.navy{background:var(--navy);color:#fff}
.btn.gold{background:var(--gold);color:#061426}
.btn.green{background:var(--green);color:#fff}
.btn.red{background:var(--red);color:#fff}
.btn.light{background:#eef5fc;color:var(--navy);border:1px solid var(--line)}
.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.btn.full{width:100%}
.input,.select,textarea{
  width:100%;min-height:44px;border:1px solid #cbd9e8;border-radius:13px;
  padding:10px 12px;background:#fff;color:var(--ink);outline:none
}
textarea{min-height:96px;resize:vertical;line-height:1.45}
.input:focus,.select:focus,textarea:focus{border-color:var(--navy2);box-shadow:0 0 0 3px rgba(13,49,95,.12)}
.label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:950;color:#475467;margin:0 0 5px}
.kicker{font-size:12px;text-transform:uppercase;letter-spacing:.12em;font-weight:950;color:var(--navy2);margin-bottom:8px}
.notice{background:#f6fbff;border:1px solid #cfe5f7;color:#123a66;border-radius:14px;padding:11px 13px;line-height:1.45;font-weight:750}
.empty{border:1px dashed #c7d7e7;background:#fff;border-radius:16px;padding:24px;text-align:center;color:var(--muted);font-weight:800}
.start{
  min-height:100vh;display:grid;place-items:center;padding:24px
}
.startCard{
  width:min(1050px,100%);background:#fff;border:1px solid var(--line);border-radius:30px;
  box-shadow:0 25px 80px rgba(7,31,61,.18);overflow:hidden
}
.startHero{
  background:
    radial-gradient(circle at 10% 20%,rgba(244,196,48,.30),transparent 24%),
    linear-gradient(135deg,var(--navy),#041225);
  color:#fff;padding:34px
}
.startHero h1{font-size:38px;line-height:1.05;margin:0 0 10px}
.startHero p{margin:0;color:#dbe8f4;line-height:1.5;max-width:760px}
.startBody{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:22px;background:#f8fbff}
.portalTile{border:1px solid var(--line);border-radius:24px;background:#fff;padding:22px;box-shadow:0 10px 26px rgba(7,31,61,.08)}
.portalTile h2{margin:0 0 8px;color:var(--navy)}
.portalTile p{color:var(--muted);line-height:1.45;min-height:42px}
.loginPanel{padding:22px;border-top:1px solid var(--line);background:#fff}
.appShell{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh}
.side{
  background:linear-gradient(180deg,var(--navy),#041225);color:#fff;padding:16px;position:sticky;top:0;height:100vh;overflow:auto
}
.brand{display:grid;grid-template-columns:54px 1fr;gap:12px;align-items:center;margin-bottom:16px}
.logoCircle{width:54px;height:54px;border-radius:50%;background:var(--gold);color:var(--navy);display:grid;place-items:center;font-weight:950;border:4px solid rgba(255,255,255,.18)}
.brand h2{margin:0;font-size:16px;line-height:1.2}
.brand small{color:#cbd9e8}
.nav{display:grid;gap:8px}
.nav button{
  width:100%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;
  border-radius:14px;min-height:42px;padding:9px 12px;text-align:left;font-weight:900
}
.nav button.active,.nav button:hover{background:var(--gold);color:#061426}
.main{padding:18px;min-width:0}
.topbar{
  background:#fff;border:1px solid var(--line);border-radius:22px;padding:15px 18px;margin-bottom:16px;
  box-shadow:0 10px 28px rgba(7,31,61,.08);display:flex;justify-content:space-between;align-items:center;gap:12px
}
.topbar h1{margin:0;font-size:23px;color:var(--navy)}
.topbar p{margin:3px 0 0;color:var(--muted);font-size:13px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.card{
  background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 8px 24px rgba(7,31,61,.07);min-width:0;overflow:hidden
}
.card h2,.card h3{margin:0 0 8px;color:var(--navy)}
.card p{color:var(--muted);line-height:1.45}
.stat b{display:block;font-size:30px;color:var(--navy)}
.stat span{font-size:12px;text-transform:uppercase;font-weight:950;color:var(--muted);letter-spacing:.08em}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0}
.studentWorkspace{
  display:grid;grid-template-columns:minmax(260px,340px) minmax(0,1fr);gap:16px;align-items:start
}
.studentListCards{display:grid;grid-template-columns:repeat(auto-fit,minmax(285px,1fr));gap:12px}
.studentCard{
  border:1px solid var(--line);background:#fff;border-radius:20px;padding:13px;box-shadow:0 8px 22px rgba(7,31,61,.06);min-width:0
}
.studentHead{display:grid;grid-template-columns:56px minmax(0,1fr);gap:11px;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #edf3f8}
.photo{
  width:54px;height:54px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);background:#eef5fc;display:grid;place-items:center;font-weight:950;color:var(--navy)
}
.studentHead h3{font-size:15px;margin:0;line-height:1.2;overflow-wrap:anywhere}
.studentHead small{display:block;color:var(--muted);font-size:12px;line-height:1.35;overflow-wrap:anywhere}
.studentFields{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.field.full{grid-column:1/-1}
.field input,.field select{min-height:38px;border-radius:10px;padding:7px 9px;font-size:13px}
.field label{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#475467;font-weight:950;display:block;margin-bottom:4px}
.readonly{min-height:38px;background:#f8fbff;border:1px solid #e4edf6;border-radius:10px;padding:7px 9px;font-size:13px;font-weight:800;color:var(--navy);overflow-wrap:anywhere}
.actionGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.actionGrid .btn{font-size:12px;min-height:36px;border-radius:10px;padding:7px}
.actionGrid .full{grid-column:1/-1}
.quizCard{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;margin:10px 0}
.questionBox{border:1px solid #dce8f5;border-radius:16px;padding:12px;margin:12px 0;background:#fbfdff}
.choiceGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.submissionCard{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;margin-bottom:12px}
.reportSheet{
  background:#fff;border:2px solid var(--navy);border-radius:18px;padding:18px;color:#111;
  background-image:radial-gradient(circle at 15% 20%,rgba(7,31,61,.05),transparent 12%),radial-gradient(circle at 80% 10%,rgba(244,196,48,.12),transparent 14%);
}
.reportHeader{display:flex;justify-content:space-between;gap:12px;border-bottom:3px solid var(--gold);padding-bottom:10px;margin-bottom:12px}
.reportHeader h2{margin:0;color:var(--navy)}
.tableWrap{width:100%;overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #edf2f7;text-align:left}
th{background:#f5f9fd;color:var(--navy);font-size:12px;text-transform:uppercase}
.studentPickGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.studentPick{border:1px solid var(--line);border-radius:18px;background:#fff;padding:12px;text-align:left;display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center}
.studentPick.selected{outline:3px solid rgba(244,196,48,.55)}
.studentPick b,.studentPick small{display:block;overflow-wrap:anywhere}
.mathPreview{background:#fff;border:1px solid #e4edf6;border-radius:12px;padding:10px;min-height:40px;overflow:auto}
@media(max-width:980px){
  .appShell{grid-template-columns:1fr}
  .side{position:relative;height:auto}
  .nav{display:flex;overflow-x:auto;gap:8px;padding-bottom:5px}
  .nav button{min-width:max-content;text-align:center}
  .studentWorkspace{grid-template-columns:1fr}
  .startBody{grid-template-columns:1fr}
}
@media(max-width:700px){
  .start{padding:12px}
  .startHero{padding:22px}
  .startHero h1{font-size:28px}
  .main{padding:10px}
  .topbar{display:block;padding:13px;border-radius:18px}
  .topbar h1{font-size:20px}
  .card{padding:13px;border-radius:18px}
  .grid,.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}
  .studentListCards{grid-template-columns:1fr}
  .studentFields,.choiceGrid,.actionGrid{grid-template-columns:1fr}
  .studentPickGrid{grid-template-columns:1fr}
  .btn{width:100%}
  input,select,textarea{font-size:16px}
  .reportHeader{display:block}
}
@media print{
  body{background:#fff}
  .side,.topbar,.toolbar,.btn,.topStatus{display:none!important}
  .appShell{display:block}
  .main{padding:0}
  .card{box-shadow:none;border:0}
}

/* ===== Camera Capture, Class List PDF, and Continuous Assessment Update ===== */
.modalOverlay{position:fixed;inset:0;z-index:100000;background:rgba(4,18,37,.82);display:grid;place-items:center;padding:16px}
.cameraModal{width:min(680px,100%);background:#fff;border-radius:24px;border:1px solid var(--line);box-shadow:0 28px 90px rgba(0,0,0,.35);overflow:hidden}
.cameraHeader{background:linear-gradient(135deg,var(--navy),#041225);color:#fff;padding:16px 18px;display:flex;justify-content:space-between;gap:12px;align-items:center}
.cameraHeader h2{margin:0;font-size:20px}.cameraBody{padding:16px}
.cameraStage{background:#071f3d;border-radius:18px;min-height:280px;display:grid;place-items:center;overflow:hidden;position:relative}
.cameraStage video,.cameraStage img{width:100%;max-height:460px;object-fit:contain;background:#000}
.cameraHint{color:#fff;text-align:center;padding:18px;line-height:1.5}
.cameraActions{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-top:12px}
.classListGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.classListCard{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;box-shadow:0 8px 22px rgba(7,31,61,.06)}
.classListCard h3{margin:0 0 5px;color:var(--navy)}.classListCard p{margin:0 0 10px;color:var(--muted);font-size:13px}
.classListSheet{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:12px}
.classListPrintHeader{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:3px solid var(--gold);padding-bottom:10px;margin-bottom:12px}
.classListPrintHeader h2{margin:0;color:var(--navy)}
.fitPrintTable{width:100%;border-collapse:collapse;font-size:13px}.fitPrintTable th,.fitPrintTable td{border:1px solid #d9e7f3;padding:8px;text-align:left}.fitPrintTable th{background:#f5f9fd;color:var(--navy)}
.caScoreSheet{width:100%;overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff;-webkit-overflow-scrolling:touch}
.caScoreSheet table{min-width:900px;width:100%;border-collapse:collapse}.caScoreSheet th,.caScoreSheet td{border-bottom:1px solid #edf2f7;border-right:1px solid #edf2f7;padding:8px;vertical-align:middle;font-size:13px}
.caScoreSheet th{background:#f5f9fd;color:var(--navy);position:sticky;top:0;z-index:3}.caScoreSheet th:first-child,.caScoreSheet td:first-child{position:sticky;left:0;background:#fff;z-index:2}.caScoreSheet th:first-child{background:#f5f9fd;z-index:4}
.caScoreInput{width:74px!important;min-height:34px!important;height:34px!important;padding:5px 7px!important;border-radius:8px!important;font-size:13px!important}
@media(max-width:700px){.cameraModal{border-radius:18px}.cameraHeader{display:block}.cameraStage{min-height:230px}.classListPrintHeader{display:block}}
@media print{body.printClassList *{visibility:hidden!important}body.printClassList #printArea,body.printClassList #printArea *{visibility:visible!important}body.printClassList #printArea{position:absolute!important;left:0!important;top:0!important;width:100%!important}body.printClassList .noPrint{display:none!important}}


/* ===== Student photo control, professional report card, and math editor update ===== */
.studentPhotoControls{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(145px,1fr));
  gap:8px;
  margin-top:12px;
}
.reportPro{
  background:#fff;
  border:3px double var(--navy);
  border-radius:20px;
  padding:22px;
  color:#111;
  position:relative;
  overflow:hidden;
  box-shadow:0 16px 40px rgba(7,31,61,.12);
}
.reportPro:before{
  content:"∑  √x  π  θ  ∫  x²  Δ  ∠  log  sin  cos  tan  α  β";
  position:absolute;
  inset:auto -20px 40% -20px;
  transform:rotate(-12deg);
  font-size:42px;
  letter-spacing:18px;
  color:rgba(7,31,61,.045);
  white-space:nowrap;
  pointer-events:none;
}
.reportProHeader{
  position:relative;
  display:grid;
  grid-template-columns:72px minmax(0,1fr) auto;
  gap:14px;
  align-items:center;
  border-bottom:4px solid var(--gold);
  padding-bottom:14px;
  margin-bottom:14px;
}
.reportBadge{
  width:72px;height:72px;border-radius:50%;
  background:var(--navy);color:var(--gold);
  display:grid;place-items:center;
  font-weight:950;font-size:18px;
  border:4px solid var(--gold);
}
.reportProHeader h2{
  margin:0;color:var(--navy);font-size:24px;line-height:1.15;
}
.reportProHeader p{margin:4px 0 0;color:#475467;line-height:1.35}
.reportSeal{
  border:2px solid var(--gold);
  color:var(--navy);
  border-radius:14px;
  padding:10px 12px;
  font-weight:950;
  text-align:center;
  background:#fffdf0;
}
.reportInfoGrid{
  position:relative;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin:14px 0;
}
.reportInfoBox{
  border:1px solid #d9e7f3;
  border-radius:13px;
  padding:10px;
  background:#f8fbff;
}
.reportInfoBox span{
  display:block;font-size:11px;text-transform:uppercase;font-weight:950;color:#667085;margin-bottom:4px;
}
.reportInfoBox b{color:var(--navy)}
.reportScoreBig{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  margin:14px 0;
}
.reportScoreBig div{
  border-radius:16px;
  padding:14px;
  background:linear-gradient(135deg,var(--navy),#061426);
  color:#fff;
  text-align:center;
}
.reportScoreBig span{display:block;font-size:11px;text-transform:uppercase;color:#dbe8f4;font-weight:900}
.reportScoreBig b{display:block;font-size:26px;margin-top:4px;color:var(--gold)}
.reportPro table{
  position:relative;
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
  background:#fff;
}
.reportPro th,.reportPro td{
  border:1px solid #cbd9e8;
  padding:9px;
}
.reportPro th{
  background:#0a2342;
  color:#fff;
  text-transform:uppercase;
  font-size:12px;
}
.reportSignature{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:24px;
  align-items:end;
}
.signatureLine{
  border-top:2px solid #111;
  padding-top:6px;
  text-align:center;
  font-weight:850;
}
.mathToolbar{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:8px 0;
  padding:8px;
  background:#f8fbff;
  border:1px solid #d9e7f3;
  border-radius:14px;
}
.mathToolbar button{
  min-height:32px;
  padding:5px 8px;
  border:1px solid #cbd9e8;
  background:#fff;
  color:var(--navy);
  border-radius:9px;
  font-weight:900;
  font-size:12px;
}
.assignmentList{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:10px;
}
.assignmentTile{
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  background:#fff;
  box-shadow:0 6px 18px rgba(7,31,61,.05);
}
@media(max-width:700px){
  .reportPro{padding:14px;border-radius:16px}
  .reportProHeader{grid-template-columns:1fr;text-align:center}
  .reportBadge{margin:auto}
  .reportSignature{grid-template-columns:1fr}
}
@media print{
  body.printReport *{visibility:hidden!important}
  body.printReport #reportPrintArea, body.printReport #reportPrintArea *{visibility:visible!important}
  body.printReport #reportPrintArea{position:absolute!important;left:0!important;top:0!important;width:100%!important}
  body.printReport .noPrint{display:none!important}
}


/* ===== FINAL GES 30/70 Report Card and Math Editor ===== */
.assessStructure{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.assessBox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}
.assessBox h4{margin:0 0 6px;color:var(--navy)}.assessBox b{font-size:22px;color:var(--green)}
.caFullSheet{width:100%;overflow:auto;border:2px solid var(--line);border-radius:16px;background:#fff;-webkit-overflow-scrolling:touch}
.caFullSheet table{min-width:1350px;width:max-content;border-collapse:separate;border-spacing:0}
.caFullSheet th,.caFullSheet td{border-right:1px solid #e8eef6;border-bottom:1px solid #e8eef6;padding:7px 8px;white-space:nowrap;font-size:12px}
.caFullSheet th{position:sticky;top:0;z-index:3;background:#0a2342;color:#fff;text-align:center}
.caFullSheet th:first-child,.caFullSheet td:first-child{position:sticky;left:0;z-index:4}
.caFullSheet td:first-child{background:#fff;min-width:210px}.caFullSheet th:first-child{background:#061426;z-index:5}
.caFullSheet input{width:64px!important;min-height:30px!important;height:30px!important;padding:4px 6px!important;font-size:12px!important;border-radius:8px!important}
.caMini{display:block;color:#dbe8f4;font-size:10px;margin-top:2px}.caTotalCell{font-weight:950;color:var(--navy);text-align:center}
.reportEditBox{margin-top:14px;padding:12px;border:1px solid var(--line);border-radius:16px;background:#f8fbff}
.reportEditBox textarea{min-height:78px}
.mathLiveBox{border:1px solid #cbd9e8;border-radius:14px;background:#fff;padding:8px;margin:8px 0}
math-field{width:100%;min-height:52px;border:1px solid #d9e7f3;border-radius:12px;padding:8px;font-size:20px;background:#fff}
.mathEditorNote{font-size:12px;color:#667085;line-height:1.4}
.reportPro.gesReport{border:4px double #0a2342}.reportPro.gesReport .reportProHeader{border-bottom:5px solid var(--gold)}
.reportPublishBar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:12px}
@media(max-width:700px){.caFullSheet table{min-width:1200px}}


/* ===== FINAL SECURE PROFESSIONAL REPORT CARD PRINT DESIGN ===== */
.secureReport{
  width:100%;
  max-width:980px;
  margin:0 auto;
  background:
    radial-gradient(circle at 12% 18%, rgba(244,196,48,.16), transparent 20%),
    radial-gradient(circle at 88% 12%, rgba(7,31,61,.12), transparent 22%),
    linear-gradient(135deg, rgba(255,255,255,.98), rgba(248,251,255,.98));

function defaultState(){
  return JSON.parse(JSON.stringify(SEEDED_DEFAULT_STATE));
}
let state = defaultState();
let role = null;
let currentStudentId = null;
let route = "dashboard";
let sb = null;
let applyingRemote = false;
let saveTimer = null;
let builderQuestions = [];

function normalize(){
  const d = defaultState();
  state = deepMerge(d, state || {});
  if(!Array.isArray(state.classes)) state.classes = d.classes;
  if(!Array.isArray(state.subjects)) state.subjects = d.subjects;
  if(!Array.isArray(state.students)) state.students = [];
  if(!Array.isArray(state.quizzes)) state.quizzes = [];
  if(!Array.isArray(state.submissions)) state.submissions = [];
  if(!Array.isArray(state.components)) state.components = d.components;
  if(!Array.isArray(state.scores)) state.scores = [];
  if(!Array.isArray(state.publishedReports)) state.publishedReports = [];
  if(!Array.isArray(state.reportScores)) state.reportScores = [];
  if(!Array.isArray(state.reportComments)) state.reportComments = [];
  if(!Array.isArray(state.academicYears)) state.academicYears = ["Year 1","Year 2","Year 3"];
  if(!Array.isArray(state.semesters)) state.semesters = ["Semester 1","Semester 2"];
  if(!state.activeAcademic) state.activeAcademic = {year:"Year 1", semester:"Semester 1"};
  state.students.forEach((s,i)=>{
    s.id = s.id || uid("stu");
    s.name = s.name || "STUDENT "+(i+1);
    s.code = s.code || ("STU-"+String(i+1).padStart(3,"0"));
    s.className = s.className || state.classes[0] || "";
    s.phone = s.phone || "";
    s.password = s.password || s.code || ("AM"+String(i+1).padStart(3,"0"));
    s.status = s.status || "Active";
  });
  state.quizzes.forEach(q=>{
    q.id = q.id || uid("quiz");
    q.title = q.title || "Untitled Quiz";
    q.status = q.status || "Draft";
    q.classNames = Array.isArray(q.classNames) ? q.classNames : (q.className ? [q.className] : []);
    q.questions = Array.isArray(q.questions) ? q.questions : [];
  });
}
function saveLocal(){localStorage.setItem(KEY, JSON.stringify(state))}
function loadLocal(){
  try{const s=localStorage.getItem(KEY); if(s) state=JSON.parse(s)}catch(e){}
  normalize();
}
function save(){
  normalize(); saveLocal();
  if(sb && !applyingRemote){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(pushRemote,450);
  }
}
function status(text, cls="warn"){
  const el=$("liveStatus"); if(!el)return;
  el.className="topStatus "+cls; el.textContent=text;
}
async function initSupabase(){
  const url = window.AMEST_SUPABASE_URL;
  const key = window.AMEST_SUPABASE_ANON_KEY;
  if(!url || !key || url.includes("PASTE")){
    status("Offline mode: add Supabase keys","warn"); return;
  }
  try{
    sb = window.supabase.createClient(url,key);
    status("Connecting live...","warn");
    const {data,error}=await sb.from("app_state").select("data").eq("id","main").maybeSingle();
    if(error){console.error(error); status("Live load error","bad")}
    else if(data && data.data && Object.keys(data.data).length){
      applyingRemote=true; state=deepMerge(defaultState(), data.data); normalize(); saveLocal(); applyingRemote=false; status("Live","live");
    }else{
      await pushRemote();
    }
    sb.channel("isaacs-assessment-live")
      .on("postgres_changes",{event:"*",schema:"public",table:"app_state",filter:"id=eq.main"},payload=>{
        if(!payload.new || !payload.new.data)return;
        applyingRemote=true; state=deepMerge(defaultState(), payload.new.data); normalize(); saveLocal(); applyingRemote=false;
        status("Live updated","live"); render();
      }).subscribe(s=>{if(s==="SUBSCRIBED")status("Live","live")});
  }catch(e){console.error(e); status("Supabase error","bad")}
}
async function pushRemote(){
  if(!sb)return;
  try{
    normalize();
    const {error}=await sb.from("app_state").upsert({id:"main",data:state,updated_at:new Date().toISOString()},{onConflict:"id"});
    if(error){console.error(error); status("Live sync error","bad")}
    else status("Live","live");
  }catch(e){console.error(e); status("Live sync failed","bad")}
}

function subjectForClass(cls){
  const s = state.subjects.find(x=>(x.classes||[]).includes(cls));
  return s ? s.name : "";
}
function classesForSubject(subj){
  const s=state.subjects.find(x=>x.name===subj);
  return s ? (s.classes||[]) : state.classes;
}
function student(id){return state.students.find(s=>s.id===id)}
function quiz(id){return state.quizzes.find(q=>q.id===id)}
function submission(id){return state.submissions.find(s=>s.id===id)}
function classOptions(sel=""){return state.classes.map(c=>`<option value="${esc(c)}" ${sel===c?"selected":""}>${esc(c)}</option>`).join("")}
function subjectOptions(sel=""){return state.subjects.map(s=>`<option value="${esc(s.name)}" ${sel===s.name?"selected":""}>${esc(s.name)}</option>`).join("")}
function photoHTML(s){return s.photo ? `<img class="photo" src="${s.photo}" alt="">` : `<div class="photo">${esc((s.name||"ST").split(/\s+/).map(x=>x[0]).join("").slice(0,2))}</div>`}
function typeset(){try{if(window.MathJax && MathJax.typesetPromise)MathJax.typesetPromise()}catch(e){}}

/* Real camera capture instead of opening file picker */
let cameraStream = null;
let cameraStudentId = null;
let capturedPhotoData = null;
async function openCameraCapture(studentId){
  cameraStudentId = studentId;
  capturedPhotoData = null;
  document.body.insertAdjacentHTML("beforeend", `<div id="cameraOverlay" class="modalOverlay">
    <div class="cameraModal">
      <div class="cameraHeader"><h2>Take Student Picture</h2><button class="btn gold" onclick="closeCameraCapture()">Close</button></div>
      <div class="cameraBody">
        <div class="cameraStage" id="cameraStage"><div class="cameraHint">Opening camera...</div></div>
        <div class="cameraActions">
          <button class="btn green" onclick="capturePhoto()">Capture</button>
          <button class="btn gold" onclick="retakePhoto()">Retake</button>
          <button class="btn light" onclick="deleteCapturedPhoto()">Delete</button>
          <button class="btn navy" onclick="saveCapturedPhoto()">Save Picture</button>
        </div>
        <p class="notice">If the browser asks for permission, allow camera access. On phones, this opens the camera directly.</p>
      </div>
    </div>
  </div>`);
  try{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("Camera API unavailable");
    cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}, audio:false});
    $("cameraStage").innerHTML = `<video id="cameraVideo" autoplay playsinline muted></video><canvas id="cameraCanvas" class="hidden"></canvas>`;
    $("cameraVideo").srcObject = cameraStream;
  }catch(e){
    $("cameraStage").innerHTML = `<div class="cameraHint">Camera could not open. Please allow camera permission in the browser. If it still fails, use Upload Photo.</div>`;
  }
}
function capturePhoto(){
  const video = $("cameraVideo");
  if(!video) return alert("Camera is not ready.");
  const canvas = $("cameraCanvas") || document.createElement("canvas");
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext("2d").drawImage(video,0,0,canvas.width,canvas.height);
  capturedPhotoData = canvas.toDataURL("image/jpeg",0.9);
  $("cameraStage").innerHTML = `<img src="${capturedPhotoData}" alt="Captured student picture">`;
}
function retakePhoto(){
  if(cameraStream) cameraStream.getTracks().forEach(t=>t.stop());
  const id = cameraStudentId;
  closeCameraCapture(false);
  openCameraCapture(id);
}
function deleteCapturedPhoto(){
  capturedPhotoData = null;
  const s = student(cameraStudentId);
  if(s){ delete s.photo; save(); }
  alert("Picture deleted. You can retake or close.");
}
function saveCapturedPhoto(){
  if(!capturedPhotoData) return alert("Capture the picture first.");
  const s = student(cameraStudentId);
  if(!s) return;
  s.photo = capturedPhotoData;
  save();
  closeCameraCapture();
  if(role==="admin") students();
  else renderShell();
}
function closeCameraCapture(refresh=true){
  if(cameraStream){ cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; }
  const o=$("cameraOverlay"); if(o) o.remove();
}

function setCAScore(studentId, componentId, value){
  const num = value === "" ? "" : Number(value);
  let sc = state.scores.find(s=>s.studentId===studentId && s.componentId===componentId);
  if(sc){
    if(value === "") state.scores = state.scores.filter(s=>s!==sc);
    else sc.value = num || 0;
  }else if(value !== ""){
    state.scores.push({id:uid("score"), studentId, componentId, value:num||0, createdAt:now()});
  }
  save();
}

/* Data preservation bridge:
   imports earlier portal data from the old localStorage key when needed.
   This keeps the names, classes, phone numbers, pictures, and passwords already entered.
*/
(function(){
  const OLD_KEYS = [
    "amest_fixed_simple_quiz_v2",
    "amest_assessment_portal_live",
    "amest_assessment_portal"
  ];
  window.importOldPortalDataIfNeeded = function(){
    try{
      if(state && Array.isArray(state.students) && state.students.length) return false;
      for(const k of OLD_KEYS){
        const raw = localStorage.getItem(k);
        if(!raw) continue;
        const old = JSON.parse(raw);
        if(old && Array.isArray(old.students) && old.students.length){
          state.classes = old.classes || state.classes || [];
          state.subjects = old.subjects || state.subjects || [];
          state.students = old.students.map((s,i)=>({
            id:s.id || ("stu_old_"+i),
            code:s.code || ("STU-"+String(i+1).padStart(3,"0")),
            name:s.name || "",
            className:s.className || "",
            status:s.status || "Active",
            guardian:s.guardian || "",
            phone:s.phone || "",
            password:s.password || s.code || ("STU-"+String(i+1).padStart(3,"0")),
            photo:s.photo || undefined
          }));
          if(old.quizzes) state.quizzes = old.quizzes;
          if(old.submissions) state.submissions = old.submissions;
          if(old.components) state.components = old.components;
          if(old.scores) state.scores = old.scores;
          save();
          return true;
        }
      }
    }catch(e){ console.warn("Old data import skipped", e); }
    return false;
  };
})();



/* ===== FINAL OVERRIDES: GES 30/70 scoring, report editing, and live math editor ===== */
function reportComponents(){
  return [
    {key:"ex1", label:"Exercise 1", max:100, weight:10},
    {key:"ex2", label:"Exercise 2", max:100, weight:10},
    {key:"ex3", label:"Exercise 3", max:100, weight:10},
    {key:"proj1", label:"Project Work 1", max:100, weight:15},
    {key:"proj2", label:"Project Work 2", max:100, weight:15},
    {key:"proj3", label:"Project Work 3", max:100, weight:15},
    {key:"group", label:"Group Work", max:100, weight:25},
    {key:"exam", label:"Examination", max:100, weight:70}
  ];
}
function getReportRecord(studentId){
  state.reportScores = state.reportScores || [];
  let r = state.reportScores.find(x=>x.studentId===studentId);
  if(!r){ r = {id:uid("rep"), studentId}; state.reportScores.push(r); }
  return r;
}
function getReportScore(studentId,key){
  const r = getReportRecord(studentId);
  return r[key] === undefined || r[key] === null ? "" : r[key];
}
function setReportScore(studentId,key,value){
  const r = getReportRecord(studentId);
  if(value === "") delete r[key];
  else {
    let n = Number(value);
    if(Number.isNaN(n)) n = 0;
    if(n < 0) n = 0;
    if(n > 100) n = 100;
    r[key] = n;
  }
  save();
}
function calculateReportScore(studentId){
  const comps = reportComponents();
  let classRaw = 0;
  comps.filter(c=>c.key!=="exam").forEach(c=>{
    const raw = Number(getReportScore(studentId,c.key)) || 0;
    classRaw += (raw / c.max) * c.weight;
  });
  classRaw = Math.round(classRaw*100)/100;
  const class30 = Math.round(classRaw * 0.30 * 100)/100;
  const examRaw = Number(getReportScore(studentId,"exam")) || 0;
  const exam70 = Math.round(examRaw * 0.70 * 100)/100;
  const finalScore = Math.round((class30 + exam70)*100)/100;
  const [grade,aggregate,remark] = gradeFor(finalScore);
  return {classRaw,class30,examRaw,exam70,finalScore,grade,aggregate,remark};
}
function gradeFor(v){
  v = Number(v) || 0;
  if(v>=80)return["A1",1,"Excellent"];
  if(v>=75)return["B2",2,"Very Good"];
  if(v>=70)return["B3",3,"Good"];
  if(v>=65)return["C4",4,"Credit"];
  if(v>=60)return["C5",5,"Credit"];
  if(v>=55)return["C6",6,"Credit"];
  if(v>=50)return["D7",7,"Pass"];
  if(v>=45)return["E8",8,"Weak Pass"];
  return["F9",9,"Fail"];
}
function getReportComment(studentId){
  state.reportComments = state.reportComments || [];
  return state.reportComments.find(x=>x.studentId===studentId)?.comment || "";

function defaultReportComment(calc){
  if(calc.finalScore >= 80) return "Excellent performance. Keep up the good work.";

}

function makeAuthCode(studentId, calc){
  const raw = `${studentId}|${calc.finalScore}|${state.settings.studentCode||'AMEST'}|${new Date().getFullYear()}`;
  let h = 0;
  for(let i=0;i<raw.length;i++){ h = ((h<<5)-h) + raw.charCodeAt(i); h |= 0; }
  return `AM-${Math.abs(h).toString(36).toUpperCase()}-${String(Math.round(calc.finalScore*100)).padStart(4,'0')}`;
}
function qrPattern(code){
  let seed = 0;
  for(let i=0;i<code.length;i++) seed += code.charCodeAt(i)*(i+1);
  let cells = "";
  for(let i=0;i<49;i++){
    const on = (i<3 || i%7===0 || ((seed+i*17)%5)<2 || [6,42,48].includes(i));
    cells += `<i style="opacity:${on?1:.08}"></i>`;
  }
  return cells;
}

/* ===== FINAL OVERRIDE: ACADEMIC YEAR / SEMESTER ARCHIVE SYSTEM ===== */
function ensureAcademicState(){
  state.academicYears = Array.isArray(state.academicYears) && state.academicYears.length ? state.academicYears : ["Year 1","Year 2","Year 3"];
  state.semesters = Array.isArray(state.semesters) && state.semesters.length ? state.semesters : ["Semester 1","Semester 2"];
  state.activeAcademic = state.activeAcademic || {year:"Year 1", semester:"Semester 1"};
  if(!state.academicYears.includes(state.activeAcademic.year)) state.activeAcademic.year = state.academicYears[0];
  if(!state.semesters.includes(state.activeAcademic.semester)) state.activeAcademic.semester = state.semesters[0];
  state.reportScores = Array.isArray(state.reportScores) ? state.reportScores : [];

}
function periodKey(year, semester){
  return `${year || state.activeAcademic?.year || "Year 1"}__${semester || state.activeAcademic?.semester || "Semester 1"}`;

function currentPeriodKey(){
  ensureAcademicState();

}
function periodLabelFromKey(key){
  const parts = String(key||"Year 1__Semester 1").split("__");
  return {year:parts[0]||"Year 1", semester:parts[1]||"Semester 1", label:`${parts[0]||"Year 1"} • ${parts[1]||"Semester 1"}`};
}
function publicationKey(studentId, key=currentPeriodKey()){

function getReportRecord(studentId){
  ensureAcademicState();
  const key = currentPeriodKey();
  let r = state.reportScores.find(x=>x.studentId===studentId && x.periodKey===key);
  if(!r){
    /* migrate an old record without a semester into the active semester one time */
    const old = state.reportScores.find(x=>x.studentId===studentId && !x.periodKey);
    if(old){
      old.periodKey = key;
      r = old;
    }
  }
  if(!r){
    r = {id:uid("rep"), studentId, periodKey:key};
    state.reportScores.push(r);
  }
  return r;
}
function getReportComment(studentId){
  ensureAcademicState();
  const key = currentPeriodKey();
  let r = state.reportComments.find(x=>x.studentId===studentId && x.periodKey===key);
  if(!r){
    const old = state.reportComments.find(x=>x.studentId===studentId && !x.periodKey);
    if(old){ old.periodKey = key; r = old; }
  }
  return r?.comment || "";
}
function saveReportComment(studentId){
  ensureAcademicState();
  const key = currentPeriodKey();
  const val = $(`reportComment_${studentId}`)?.value || "";
  let r = state.reportComments.find(x=>x.studentId===studentId && x.periodKey===key);
  if(!r){
    r = {id:uid("com"), studentId, periodKey:key, comment:""};
    state.reportComments.push(r);
  }
  r.comment = val;
  r.updatedAt = now();
  save();
  alert("Report correction/comment saved for the selected academic year and semester.");
  reports();
}
function isReportPublished(studentId){
  ensureAcademicState();

  return state.publishedReports.includes(publicationKey(studentId,key));
}
function isReportPublishedForPeriod(studentId,key){

function publishReport(studentId){
  if(!studentId) return;
  ensureAcademicState();
  const key = currentPeriodKey();
  const pkey = publicationKey(studentId,key);

    state.publishedReports = state.publishedReports.filter(x=>x!==pkey);

function cleanReferenceCode(studentId, calc){
  const raw = `${studentId}|${currentPeriodKey ? currentPeriodKey() : ''}|${calc.finalScore}|${state.settings.studentCode||'AMEST'}`;
  let h = 0;
  for(let i=0;i<raw.length;i++){ h = ((h<<5)-h) + raw.charCodeAt(i); h |= 0; }
  return `REF-${Math.abs(h).toString(36).toUpperCase()}-${String(Math.round(calc.finalScore*100)).padStart(4,'0')}`;
}
function cleanMiniPattern(code){
  let seed = 0;
  for(let i=0;i<code.length;i++) seed += code.charCodeAt(i)*(i+1);
  let cells = "";
  for(let i=0;i<25;i++){
    const on = i===0 || i===4 || i===20 || i===24 || ((seed+i*13)%4)<2;
    cells += `<i style="opacity:${on?1:.10}"></i>`;
  }
  return cells;
}

/* ===== CONTINUOUS ASSESSMENT FULL-SCREEN AND FIT-TO-SCREEN VIEW ===== */
let caCurrentScale = 1;
let caOriginalParent = null;
let caOriginalNext = null;
let caFullscreenArea = null;

function caEnsureWrapped(area){
  if(!area) return null;
  let table = area.querySelector("table");
  if(!table) return null;
  if(table.parentElement && table.parentElement.classList.contains("caScaleWrap")){
    return table.parentElement;
  }
  const wrap = document.createElement("div");
  wrap.className = "caScaleWrap";
  table.parentNode.insertBefore(wrap, table);
  wrap.appendChild(table);
  return wrap;
}
function caApplyScale(scale){
  const area = document.getElementById("caPrintArea");
  if(!area) return;
  const wrap = caEnsureWrapped(area);
  const table = wrap ? wrap.querySelector("table") : null;
  if(!wrap || !table) return;
  caCurrentScale = Math.max(0.35, Math.min(1.4, scale));
  table.style.transform = `scale(${caCurrentScale})`;
  table.style.transformOrigin = "top left";
  const rawW = table.scrollWidth || table.offsetWidth || 1200;
  const rawH = table.scrollHeight || table.offsetHeight || 600;
  wrap.style.width = (rawW * caCurrentScale) + "px";
  wrap.style.height = (rawH * caCurrentScale) + "px";
  area.classList.add("caFitted");
  const label = document.getElementById("caFitStatus");
  if(label) label.textContent = "View size: " + Math.round(caCurrentScale * 100) + "%";
}
function caFitAllColumns(){
  const area = document.getElementById("caPrintArea");
  if(!area) return alert("Open the Continuous Assessment sheet first.");
  const wrap = caEnsureWrapped(area);
  const table = wrap ? wrap.querySelector("table") : null;
  if(!table) return;
  const available = Math.max(320, area.clientWidth - 18);
  const total = table.scrollWidth || table.offsetWidth || available;
  const scale = Math.min(1, available / total);
  caApplyScale(scale);
}
function caNormalSize(){
  caApplyScale(1);
}
function caZoomIn(){
  caApplyScale(caCurrentScale + 0.08);
}
function caZoomOut(){
  caApplyScale(caCurrentScale - 0.08);
}
function caScrollRight(){
  const area = document.getElementById("caPrintArea");
  if(area) area.scrollBy({left:450, behavior:"smooth"});
}
function caScrollLeft(){
  const area = document.getElementById("caPrintArea");
  if(area) area.scrollBy({left:-450, behavior:"smooth"});
}
function caAddFitControls(){
  const area = document.getElementById("caPrintArea");
  if(!area) return;
  if(document.getElementById("caFitControls")) return;
  const controls = document.createElement("div");
  controls.id = "caFitControls";
  controls.className = "caFitControls";
  controls.innerHTML = `<div class="caLeft">
    <button class="navyBtn" onclick="caOpenFullscreen()">Full Screen Entry Mode</button>
    <button class="goldBtn" onclick="caFitAllColumns()">Fit All Columns</button>
    <button class="lightBtn" onclick="caNormalSize()">Normal Size</button>
    <span id="caFitStatus" class="caFitStatus">View size: 100%</span>
  </div>
  <div class="caRight">
    <button class="lightBtn" onclick="caZoomOut()">Zoom −</button>
    <button class="lightBtn" onclick="caZoomIn()">Zoom +</button>
    <button class="lightBtn" onclick="caScrollLeft()">← Left</button>
    <button class="lightBtn" onclick="caScrollRight()">Right →</button>
  </div>`;
  area.parentNode.insertBefore(controls, area);
}
function caOpenFullscreen(){
  const area = document.getElementById("caPrintArea");
  if(!area) return alert("Open the Continuous Assessment sheet first.");
  if(document.getElementById("caFullscreenOverlay")) return;

  caOriginalParent = area.parentNode;
  caOriginalNext = area.nextSibling;

  const overlay = document.createElement("div");
  overlay.id = "caFullscreenOverlay";
  overlay.className = "caFullscreenOverlay";
  overlay.innerHTML = `<div class="caFullscreenTop">
    <div><h2>Full Screen Continuous Assessment Entry</h2><p>Use Fit All Columns to see every student and assessment column at once. Correct any value directly in the sheet.</p></div>
    <div class="caFullBtns">
      <button class="goldBtn" onclick="caFitAllColumns()">Fit All Columns</button>
      <button class="lightBtn" onclick="caNormalSize()">Normal</button>
      <button class="lightBtn" onclick="caZoomOut()">Zoom −</button>
      <button class="lightBtn" onclick="caZoomIn()">Zoom +</button>
      <button class="redBtn" onclick="caCloseFullscreen()">Close</button>
    </div>
  </div><div id="caFullscreenBody" class="caFullscreenBody"></div>`;

  document.body.appendChild(overlay);
  document.body.classList.add("caFullscreenLock");
  caFullscreenArea = document.getElementById("caFullscreenBody");
  caFullscreenArea.appendChild(area);
  caNormalSize();
  setTimeout(caFitAllColumns, 150);
}
function caCloseFullscreen(){
  const overlay = document.getElementById("caFullscreenOverlay");
  const area = document.getElementById("caPrintArea");
  if(area && caOriginalParent){
    if(caOriginalNext) caOriginalParent.insertBefore(area, caOriginalNext);
    else caOriginalParent.appendChild(area);
  }
  if(overlay) overlay.remove();
  document.body.classList.remove("caFullscreenLock");
  caFullscreenArea = null;
  caNormalSize();
  setTimeout(caAddFitControls, 50);
}
(function(){
  const oldComponents = window.components;
  if(typeof oldComponents === "function"){
    window.components = function(){
      const result = oldComponents.apply(this, arguments);
      setTimeout(caAddFitControls, 80);
      return result;
    };
  }
  const oldSetRoute = window.setRoute;
  if(typeof oldSetRoute === "function"){
    window.setRoute = function(r){
      const result = oldSetRoute.apply(this, arguments);
      if(r === "components") setTimeout(caAddFitControls, 150);
      return result;
    };
  }
  window.addEventListener("resize", function(){
    if(document.getElementById("caPrintArea") && caCurrentScale < 1) caFitAllColumns();
  });
  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(caAddFitControls, 500);
  });
  const observer = new MutationObserver(function(){
    if(document.getElementById("caPrintArea")) setTimeout(caAddFitControls, 50);
  });
  observer.observe(document.body, {childList:true, subtree:true});
})();

function updateCALiveRow(studentId){
  try{
    const calc = calculateReportScore(studentId);
    const map = {
      classRaw: calc.classRaw,
      class30: calc.class30,
      exam70: calc.exam70,
      finalScore: calc.finalScore,

    };

        el.classList.remove("caLiveUpdated");

    });

function reportComponents(){
  return [
    {key:"ex1", label:"Exercise 1", max:10, weight:10, group:"Exercises"},
    {key:"ex2", label:"Exercise 2", max:10, weight:10, group:"Exercises"},

    {key:"ex4", label:"Exercise 4", max:10, weight:10, group:"Exercises"},

    {key:"hw3", label:"Project / Homework 3", max:5, weight:5, group:"Project / Homework"},
    {key:"hw4", label:"Project / Homework 4", max:5, weight:5, group:"Project / Homework"},
    {key:"classTest", label:"Class Test", max:20, weight:20, group:"Class Test"},
    {key:"participation", label:"Class Participation", max:10, weight:10, group:"Participation"},
    {key:"group", label:"Group Work", max:10, weight:10, group:"Group Work"},
    {key:"exam", label:"Examination", max:100, weight:70, group:"Examination"}
  ];
}
function componentMax(key){
  const c = reportComponents().find(x=>x.key===key);
  return c ? c.max : 100;
}
function setReportScore(studentId,key,value){
  const r = getReportRecord(studentId);
  if(value === ""){
    delete r[key];
  }else{
    let n = Number(value);
    if(Number.isNaN(n)) n = 0;
    if(n < 0) n = 0;
    const max = componentMax(key);
    if(n > max){
      n = max;
      const active = document.activeElement;
      if(active && active.tagName === "INPUT") active.value = max;
      alert("Maximum score for this item is " + max + ". The value has been corrected to " + max + ".");
    }
    r[key] = n;
  }
  save();
  if(typeof updateCALiveRow === "function") updateCALiveRow(studentId);
}
function calculateReportScore(studentId){
  const comps = reportComponents();
  let classRaw = 0;
  comps.filter(c=>c.key!=="exam").forEach(c=>{
    const raw = Number(getReportScore(studentId,c.key)) || 0;
    classRaw += (raw / c.max) * c.weight;
  });
  classRaw = Math.round(classRaw*100)/100;         // out of 100
  const class30 = Math.round(classRaw * 0.30 * 100)/100;
  const examRaw = Number(getReportScore(studentId,"exam")) || 0; // out of 100
  const exam70 = Math.round(examRaw * 0.70 * 100)/100;
  const finalScore = Math.round((class30 + exam70)*100)/100;
  const [grade,aggregate,remark] = gradeFor(finalScore);
  return {classRaw,class30,examRaw,exam70,finalScore,grade,aggregate,remark};
}

function caArrowNavigate(event){
  if(!["ArrowRight","ArrowLeft","ArrowDown","ArrowUp","Enter"].includes(event.key)) return;
  const inputs = Array.from(document.querySelectorAll(".caScoreNavInput"));
  if(!inputs.length) return;
  const current = event.target;
  let i = inputs.indexOf(current);
  if(i < 0) return;
  event.preventDefault();
  const compsCount = reportComponents().length;
  if(event.key === "ArrowRight" || event.key === "Enter") i++;
  else if(event.key === "ArrowLeft") i--;
  else if(event.key === "ArrowDown") i += compsCount;
  else if(event.key === "ArrowUp") i -= compsCount;
  i = Math.max(0, Math.min(inputs.length-1, i));
  inputs[i].focus();
  inputs[i].select();
}

/* ===== IMPROVED CAMERA CAPTURE OVERRIDE ===== */
window._cameraLastSavedPhoto = null;
window._cropZoomValue = 1;
window._cropXValue = 50;
window._cropYValue = 50;

function refreshAfterCameraSave(){
  try{
    if(role === "admin" && typeof students === "function") students();
    else if(role === "student" && typeof studentHome === "function") studentHome();
    else if(typeof renderShell === "function") renderShell();
  }catch(e){
    try{ renderShell(); }catch(err){}
  }
}

async function openCameraCapture(studentId){
  cameraStudentId = studentId;
  capturedPhotoData = null;
  window._cropZoomValue = 1;
  window._cropXValue = 50;
  window._cropYValue = 50;

  const old = $("cameraOverlay");
  if(old) old.remove();

  document.body.insertAdjacentHTML("beforeend", `<div id="cameraOverlay" class="modalOverlay">
    <div class="cameraModal improvedCamera">
      <div class="cameraHeader">
        <h2>Take Student Picture</h2>
        <button class="btn gold" onclick="closeCameraCapture()">Close</button>
      </div>
      <div class="cameraBody">
        <div class="cameraStage improvedStage" id="cameraStage"><div class="cameraHint">Opening camera...</div></div>
        <div class="cameraActions">
          <button class="btn green" onclick="captureAndInsertPhoto()">Capture & Insert</button>
          <button class="btn gold" onclick="captureForCrop()">Capture & Crop</button>
          <button class="btn light" onclick="retakePhoto()">Back / Retake</button>
          <button class="btn red" onclick="closeCameraCapture()">Cancel</button>
        </div>
        <p class="notice">Use <b>Capture & Insert</b> to save the picture immediately, or use <b>Capture & Crop</b> to adjust it before saving. Use Back / Retake if you are not satisfied.</p>
      </div>
    </div>
  </div>`);

  try{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      throw new Error("Camera API unavailable");
    }
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });
    $("cameraStage").innerHTML = `<video id="cameraVideo" autoplay playsinline muted></video><canvas id="cameraCanvas" class="hidden"></canvas>`;
    $("cameraVideo").srcObject = cameraStream;
  }catch(e){
    $("cameraStage").innerHTML = `<div class="cameraHint">Camera could not open. Please allow camera permission in the browser. If it still fails, use Upload Photo instead.</div>`;
  }
}

function captureCurrentFrame(){
  const video = $("cameraVideo");
  if(!video) return null;
  const canvas = $("cameraCanvas") || document.createElement("canvas");
  canvas.width = video.videoWidth || 720;
  canvas.height = video.videoHeight || 720;
  canvas.getContext("2d").drawImage(video,0,0,canvas.width,canvas.height);
  return canvas.toDataURL("image/jpeg",0.92);
}

function savePhotoDataToStudent(data){
  const s = student(cameraStudentId);
  if(!s) return false;
  window._cameraLastSavedPhoto = s.photo || null;
  s.photo = data;
  save();
  return true;
}

function captureAndInsertPhoto(){
  const data = captureCurrentFrame();
  if(!data) return alert("Camera is not ready.");
  capturedPhotoData = data;
  if(savePhotoDataToStudent(data)){
    const stage = $("cameraStage");
    if(stage){
      stage.innerHTML = `<div class="cameraPreviewWrap">
        <div class="cameraSavedNotice">Picture captured and inserted successfully.</div>
        <div class="cameraPreviewBox"><img src="${data}" alt="Captured student picture"></div>
      </div>`;
    }
    stopCameraStream();
    const actions = document.querySelector("#cameraOverlay .cameraActions");
    if(actions){
      actions.innerHTML = `
        <button class="btn gold" onclick="undoCameraInsert()">Undo / Remove Inserted Picture</button>
        <button class="btn light" onclick="retakePhoto()">Back / Retake</button>
        <button class="btn green" onclick="closeCameraCapture();refreshAfterCameraSave()">Done</button>
      `;
    }
    setTimeout(refreshAfterCameraSave, 250);
  }
}

function captureForCrop(){
  const data = captureCurrentFrame();
  if(!data) return alert("Camera is not ready.");
  capturedPhotoData = data;
  stopCameraStream();
  showCropEditor(data);
}

function showCropEditor(data){
  const stage = $("cameraStage");
  if(!stage) return;
  stage.innerHTML = `<div class="cameraPreviewWrap">
    <div class="cameraPreviewBox" id="cropPreviewBox">
      <img id="cropPreviewImage" src="${data}" alt="Captured student picture">
      <div class="cropFrame"></div>
    </div>
    <div class="cropControls">
      <label>Zoom <input id="cropZoom" type="range" min="1" max="2.5" step="0.05" value="${window._cropZoomValue}" oninput="updateCropPreview()"></label>
      <label>Move Left / Right <input id="cropX" type="range" min="0" max="100" step="1" value="${window._cropXValue}" oninput="updateCropPreview()"></label>
      <label>Move Up / Down <input id="cropY" type="range" min="0" max="100" step="1" value="${window._cropYValue}" oninput="updateCropPreview()"></label>
    </div>
  </div>`;
  const actions = document.querySelector("#cameraOverlay .cameraActions");
  if(actions){
    actions.innerHTML = `
      <button class="btn green" onclick="cropAndInsertPhoto()">Crop & Insert</button>
      <button class="btn light" onclick="retakePhoto()">Back / Retake</button>
      <button class="btn red" onclick="closeCameraCapture()">Cancel</button>
    `;
  }
  setTimeout(updateCropPreview, 100);
}

function updateCropPreview(){
  const img = $("cropPreviewImage");
  if(!img) return;
  window._cropZoomValue = Number($("cropZoom")?.value || 1);
  window._cropXValue = Number($("cropX")?.value || 50);
  window._cropYValue = Number($("cropY")?.value || 50);
  const tx = (50 - window._cropXValue) * 0.9;
  const ty = (50 - window._cropYValue) * 0.9;
  img.style.transform = `scale(${window._cropZoomValue}) translate(${tx}px, ${ty}px)`;
  img.style.transformOrigin = `${window._cropXValue}% ${window._cropYValue}%`;
}

function cropAndInsertPhoto(){
  if(!capturedPhotoData) return alert("Capture the picture first.");
  const source = new Image();
  source.onload = function(){
    const output = document.createElement("canvas");
    const size = 600;
    output.width = size;
    output.height = size;
    const ctx = output.getContext("2d");

    const zoom = window._cropZoomValue || 1;
    const cropSize = Math.min(source.width, source.height) / zoom;
    const maxX = Math.max(0, source.width - cropSize);
    const maxY = Math.max(0, source.height - cropSize);
    const sx = maxX * ((window._cropXValue || 50) / 100);
    const sy = maxY * ((window._cropYValue || 50) / 100);

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0,0,size,size);
    ctx.drawImage(source, sx, sy, cropSize, cropSize, 0, 0, size, size);

    const cropped = output.toDataURL("image/jpeg",0.92);
    capturedPhotoData = cropped;

    if(savePhotoDataToStudent(cropped)){
      const stage = $("cameraStage");
      if(stage){
        stage.innerHTML = `<div class="cameraPreviewWrap">
          <div class="cameraSavedNotice">Cropped picture inserted successfully.</div>
          <div class="cameraPreviewBox"><img src="${cropped}" alt="Cropped student picture"></div>
        </div>`;
      }
      const actions = document.querySelector("#cameraOverlay .cameraActions");
      if(actions){
        actions.innerHTML = `
          <button class="btn gold" onclick="undoCameraInsert()">Undo / Remove Inserted Picture</button>
          <button class="btn light" onclick="retakePhoto()">Back / Retake</button>
          <button class="btn green" onclick="closeCameraCapture();refreshAfterCameraSave()">Done</button>
        `;
      }
      setTimeout(refreshAfterCameraSave, 250);
    }
  };
  source.src = capturedPhotoData;
}

function undoCameraInsert(){
  const s = student(cameraStudentId);
  if(!s) return;
  if(window._cameraLastSavedPhoto) s.photo = window._cameraLastSavedPhoto;
  else delete s.photo;
  save();
  const stage = $("cameraStage");
  if(stage){
    stage.innerHTML = `<div class="cameraHint">Inserted picture has been undone. Click Back / Retake to take another picture, or click Done to close.</div>`;
  }
  setTimeout(refreshAfterCameraSave, 200);
}

function retakePhoto(){
  const id = cameraStudentId;
  closeCameraCapture(false);
  setTimeout(()=>openCameraCapture(id), 120);
}

function deleteCapturedPhoto(){
  capturedPhotoData = null;
  const s = student(cameraStudentId);
  if(s){
    window._cameraLastSavedPhoto = s.photo || null;
    delete s.photo;
    save();
  }
  const stage = $("cameraStage");
  if(stage){
    stage.innerHTML = `<div class="cameraHint">Picture deleted. Click Back / Retake to capture a new one, or close the camera.</div>`;
  }
  setTimeout(refreshAfterCameraSave, 200);
}

function saveCapturedPhoto(){
  if(!capturedPhotoData) return alert("Capture the picture first.");
  if(savePhotoDataToStudent(capturedPhotoData)){
    closeCameraCapture();
    refreshAfterCameraSave();
  }
}

function stopCameraStream(){
  if(cameraStream){
    cameraStream.getTracks().forEach(t=>t.stop());
    cameraStream = null;
  }
}

function closeCameraCapture(refresh=true){
  stopCameraStream();
  const o = $("cameraOverlay");
  if(o) o.remove();
  if(refresh) refreshAfterCameraSave();
}


/* ===== SAFE DELETE STUDENT PROMPT OVERRIDE ===== */
function deleteStudent(id){
  const s = student(id);
  if(!s) return alert("Student not found.");

  const first = confirm(
    "Do you want to delete the selected student?\n\n" +
    "Student: " + s.name + "\n" +
    "Class: " + (s.className || "Not set") + "\n" +
    "Code: " + (s.code || "Not set") + "\n\n" +
    "This action will remove this student from the portal."
  );
  if(!first) return;

  const typed = prompt(
    "Final confirmation required.\n\n" +
    "To delete " + s.name + ", type DELETE in capital letters.\n\n" +
    "Leave it blank or click Cancel to stop."
  );

  if(typed !== "DELETE"){
    alert("Delete cancelled. The student was not removed.");
    return;
  }

  state.students = (state.students || []).filter(x => x.id !== id);
  state.submissions = (state.submissions || []).filter(x => x.studentId !== id);
  state.scores = (state.scores || []).filter(x => x.studentId !== id);
  state.reportScores = (state.reportScores || []).filter(x => x.studentId !== id);
  state.reportComments = (state.reportComments || []).filter(x => x.studentId !== id);
  state.publishedReports = (state.publishedReports || []).filter(x => !String(x).endsWith("::" + id) && String(x) !== id);

  save();
  alert("Student deleted successfully.");
  if(typeof students === "function") students();
  else if(typeof renderShell === "function") renderShell();
}
