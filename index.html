/* Marking canvas, component mapping, and marked-script sharing */
.markTools{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin:10px 0;
  padding:10px;
  background:#f8fbff;
  border:1px solid #dce8f4;
  border-radius:12px;
}
.markTools button{
  border:1px solid #c7d4e4;
  background:#fff;
  color:var(--navy);
  border-radius:10px;
  padding:8px 10px;
  font-weight:800;
}
.markTools button.active{
  background:#fff1f0;
  border-color:#f0aaa4;
  color:#b42318;
}
.markCanvasWrap{
  position:relative;
  overflow:auto;
  background:#f3f7fb;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  margin-top:10px;
}
.markCanvas{
  display:block;
  max-width:100%;
  background:#fff;
  border:1px solid #cad6e2;
  border-radius:10px;
  touch-action:none;
}
.sharedMark{
  border:2px solid #0f7b4f;
  background:#f0fff6;
  border-radius:14px;
  padding:12px;
  margin-top:12px;
}
.sharedMark img{
  max-width:100%;
  border:1px solid #cde7d7;
  border-radius:10px;
  background:#fff;
}
.componentBadge{
  display:inline-flex;
  align-items:center;
  padding:4px 8px;
  border-radius:999px;
  background:#eef5fc;
  border:1px solid #d6e7f6;
  color:#123a66;
  font-size:11px;
  font-weight:900;
  text-transform:uppercase;
}


.markCanvas{
  touch-action:none!important;
  -ms-touch-action:none!important;
  user-select:none!important;
  -webkit-user-select:none!important;
  cursor:crosshair;
}
.markCanvasWrap{
  overscroll-behavior:contain;
}


/* Subject-based class assignment, HTML quiz import, and fast student portal */
.classCheckGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-top:8px;
}
.classCheck{
  display:flex;
  gap:8px;
  align-items:center;
  border:1px solid #dce8f4;
  background:#fbfdff;
  border-radius:12px;
  padding:10px 12px;
  font-weight:800;
  color:#123a66;
}
.importBox{
  border:1px dashed #bac8d8;
  background:#fbfdff;
  border-radius:14px;
  padding:12px;
  margin-top:12px;
}
.studentPickPanel{
  max-height:440px;
  overflow:auto;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  background:#fbfdff;
  margin-top:10px;
}
.studentPickBtn{
  width:100%;
  text-align:left;
  border:1px solid #dfe7f1;
  background:#fff;
  border-radius:12px;
  padding:10px 12px;
  margin-bottom:8px;
  color:var(--navy);
  font-weight:800;
}
.studentPickBtn.selected{
  border-color:var(--green);
  background:#ecfdf3;
  color:#0f6b47;
}
.filterTabs{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin:10px 0;
}
.filterTabs button{
  border:1px solid #c7d4e4;
  background:#fff;
  color:var(--navy);
  border-radius:999px;
  padding:7px 10px;
  font-weight:800;
}
.filterTabs button.active{
  background:var(--navy);
  color:#fff;
}
.resultHidden{
  background:#fff7d1;
  border:1px solid #efd36b;
  color:#6b5300;
  border-radius:12px;
  padding:12px;
}


/* Final branding, subject-separated student portal, and student photos */
.hero{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 18% 18%, rgba(242,201,76,.20), transparent 22%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.10), transparent 28%),
    linear-gradient(145deg,var(--navy),#061426)!important;
}
.hero:after{
  content:"∑  √x  π  θ  y = mx + c  x² + y² = r²  log x  sin θ";
  position:absolute;
  inset:auto -40px 30px -40px;
  color:rgba(255,255,255,.08);
  font:900 38px Georgia,serif;
  transform:rotate(-8deg);
  white-space:nowrap;
  pointer-events:none;
}
.portalTitle{
  font-family:Georgia,"Times New Roman",serif;
  font-size:38px;
  line-height:1.05;
  margin:18px 0 10px;
}
.teacherStrip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(242,201,76,.14);
  border:1px solid rgba(242,201,76,.36);
  color:#fff7d1;
  border-radius:999px;
  padding:8px 12px;
  font-weight:800;
}
.subjectPortalGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin:12px 0;
}
.subjectPortalCard{
  border:1px solid #d9e7f3;
  border-radius:18px;
  background:linear-gradient(180deg,#fff,#f8fbff);
  padding:14px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(10,35,66,.06);
}
.subjectPortalCard.active{
  border-color:var(--green);
  background:#f0fff6;
  box-shadow:0 0 0 3px rgba(15,123,79,.10);
}
.subjectPortalCard h3{
  margin:0 0 6px;
  color:var(--navy);
}
.subjectPortalCard p{
  margin:0;
  color:var(--muted);
  font-size:13px;
}
.subjectClassTabs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:10px 0;
}
.subjectClassTabs button{
  border:1px solid #c7d4e4;
  background:#fff;
  color:var(--navy);
  border-radius:999px;
  padding:8px 12px;
  font-weight:850;
}
.subjectClassTabs button.active{
  background:var(--navy);
  color:#fff;
}
.studentPhoto{
  width:48px;
  height:48px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #d6e3f0;
  background:#eef4fa;
  flex:0 0 auto;
}
.studentPhoto.large{
  width:110px;
  height:110px;
  border:4px solid var(--gold);
}
.studentPhoto.placeholder{
  display:inline-grid;
  place-items:center;
  font-weight:900;
  color:#123a66;
  background:#eef5fc;
}
.studentPickBtn{
  display:flex!important;
  align-items:center;
  gap:10px;
}
.studentPickBtn .stuMeta{
  display:block;
  min-width:0;
}
.photoUploadRow{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}
.profileCard{
  display:grid;
  grid-template-columns:130px 1fr;
  gap:18px;
  align-items:center;
}
.mathInterfaceCard{
  background:
    linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.96)),
    repeating-linear-gradient(135deg,rgba(10,35,66,.06) 0 2px, transparent 2px 48px);
}
.mathDecor{
  color:rgba(10,35,66,.12);
  font-family:Georgia,serif;
  font-size:26px;
  font-weight:900;
  letter-spacing:.03em;
  margin-top:10px;
  overflow:hidden;
  white-space:nowrap;
}
@media(max-width:900px){
  .subjectPortalGrid{grid-template-columns:1fr}
  .profileCard{grid-template-columns:1fr;text-align:center}
}


/* Stability fix: student portal, camera capture, and opening class display */
.classShowcase{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;position:relative;z-index:2}
.classShowcase .classTile{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);border-radius:14px;padding:10px 12px;color:#fff}
.classShowcase .classTile b{display:block;font-size:15px}.classShowcase .classTile small{color:#fff7d1;font-weight:800}
.cameraModal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:99999;display:grid;place-items:center;padding:18px}
.cameraBox{background:#fff;border-radius:18px;width:min(720px,100%);padding:16px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
.cameraBox video{width:100%;max-height:520px;background:#000;border-radius:14px;object-fit:cover}
.cameraBox .toolbar{justify-content:center}
.photoControlCard{border:1px solid #d9e7f3;background:#fbfdff;border-radius:14px;padding:12px;margin-top:10px}
.classSubjectOverview{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}
.classSubjectOverview .overviewCard{border:1px solid #d9e7f3;border-radius:16px;background:#fff;padding:14px;box-shadow:0 8px 20px rgba(10,35,66,.06)}
.classSubjectOverview h3{margin:0 0 8px;color:var(--navy)}
.classSubjectOverview ul{margin:0;padding-left:18px;color:#344054}
@media(max-width:900px){.classShowcase,.classSubjectOverview{grid-template-columns:1fr}}


/* Camera capture without video + crop before inserting */
.cropModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.76);
  z-index:999999;
  display:grid;
  place-items:center;
  padding:18px;
}
.cropBox{
  background:#fff;
  width:min(760px,100%);
  border-radius:20px;
  padding:18px;
  box-shadow:0 30px 90px rgba(0,0,0,.36);
}
.cropBox h3{
  margin:0 0 6px;
  color:var(--navy);
}
.cropStage{
  display:grid;
  grid-template-columns:1fr 230px;
  gap:16px;
  align-items:start;
}
.cropCanvas{
  width:100%;
  max-width:480px;
  aspect-ratio:1/1;
  border:1px solid #d6e3f0;
  border-radius:16px;
  background:#f5f7fa;
  touch-action:none;
  cursor:move;
}
.cropPreview{
  width:180px;
  height:180px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid var(--gold);
  background:#eef4fa;
  display:block;
  margin:auto;
}
.cropControls{
  border:1px solid #dce8f4;
  border-radius:14px;
  padding:12px;
  background:#fbfdff;
}
.cropControls input[type="range"]{
  width:100%;
}
.hiddenPhotoInput{
  display:none!important;
}
.loginSearchBox{
  margin:10px 0;
}
.studentPickPanel{
  max-height:360px;
}
.quickSearchHint{
  font-size:12px;
  color:#667085;
  margin-top:6px;
}
@media(max-width:820px){
  .cropStage{grid-template-columns:1fr}
  .cropPreview{width:140px;height:140px}
}


/* Reliable direct camera capture modal */
.directCameraModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  z-index:1000000;
  display:grid;
  place-items:center;
  padding:16px;
}
.directCameraBox{
  background:#fff;
  width:min(760px,100%);
  border-radius:20px;
  padding:16px;
  box-shadow:0 30px 90px rgba(0,0,0,.38);
}
.directCameraBox h3{
  color:var(--navy);
  margin:0 0 8px;
}
.directCameraView{
  width:100%;
  max-height:65vh;
  background:#000;
  border-radius:16px;
  object-fit:cover;
  display:block;
}
.cameraMessage{
  margin:10px 0 0;
  color:#667085;
  font-size:13px;
}
.noPassNotice{
  background:#ecfdf3;
  border:1px solid #bce8ce;
  color:#0f6b47;
  border-radius:12px;
  padding:10px 12px;
  margin:10px 0;
  font-weight:800;
}


/* Clear student identification: hover preview, profile modal, and marking header */
.studentClickableRow{
  cursor:pointer;
}
.studentClickableRow:hover td{
  background:#f0fff6!important;
}
.studentHoverPreview{
  position:fixed;
  z-index:1000002;
  width:250px;
  background:#fff;
  border:1px solid #d6e3f0;
  border-radius:18px;
  box-shadow:0 20px 55px rgba(10,35,66,.25);
  padding:14px;

function answerInput(q){if(q.type==='mcq')return q.options.map((o,i)=>`<label class="option"><input type="radio" name="${q.id}" value="${i}"><span><b>${'ABCD'[i]}.</b> ${opRender(o)}</span></label>`).join('');if(q.type==='fill')return `<input class="input fillAns" data-qid="${q.id}" placeholder="Type your answer"><label class="label">Mathematics answer, if needed</label>${mf('mathAns_'+q.id,'Type mathematics answer')}`;if(q.type==='theory')return `<textarea class="theoryAns" data-qid="${q.id}" placeholder="Type your solution"></textarea><label class="label">Mathematics working, if needed</label>${mf('mathAns_'+q.id,'Type mathematics working')}<div class="uploadBox"><label class="label">Upload image or PDF, if needed</label><input class="fileAns input" data-qid="${q.id}" type="file" accept="image/*,application/pdf"></div>`;return `<div class="uploadBox"><label class="label">Upload your scanned solution or PDF</label><input class="fileAns input" data-qid="${q.id}" type="file" accept="image/*,application/pdf"></div><textarea class="theoryAns" data-qid="${q.id}" placeholder="Optional note"></textarea>`}
function fileData(file){return new Promise(res=>{if(!file)return res(null);let r=new FileReader();r.onload=()=>res({name:file.name,type:file.type,data:r.result});r.readAsDataURL(file)})}function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[{}\\]/g,'')}
async function submitQuiz(qid){let q=state.quizzes.find(x=>x.id===qid),answers={},score=0,total=0,pending=false;for(let qq of q.questions){total+=qq.marks;if(qq.type==='mcq'){let el=document.querySelector(`input[name="${qq.id}"]:checked`);if(!el)return alert('Answer all MCQs');let c=+el.value;answers[qq.id]={type:'mcq',choice:c,teacherMark:c===qq.answer?qq.marks:0};if(c===qq.answer)score+=qq.marks}else if(qq.type==='fill'){let text=document.querySelector(`.fillAns[data-qid="${qq.id}"]`)?.value.trim()||'',math=latex('mathAns_'+qq.id);if(!text&&!math)return alert('Answer all fill-in questions');let ok=norm(text)===norm(qq.acceptedText)||norm(math)===norm(qq.acceptedMath);answers[qq.id]={type:'fill',text,math,autoCorrect:ok,teacherMark:ok?qq.marks:0};if(ok)score+=qq.marks}else{let text=document.querySelector(`.theoryAns[data-qid="${qq.id}"]`)?.value.trim()||'',math=latex('mathAns_'+qq.id),file=await fileData(document.querySelector(`.fileAns[data-qid="${qq.id}"]`)?.files?.[0]);if(qq.type==='upload'&&!file)return alert('Upload required solution');if(qq.type==='theory'&&!text&&!math&&!file)return alert('Answer all theory questions');answers[qq.id]={type:qq.type,text,math,file,teacherMark:0,feedback:''};pending=true}}state.submissions.push({id:uid('sub'),quizId:q.id,studentId:currentStudentId,answers,score,total,pending,teacherMarked:!pending,submittedAt:new Date().toLocaleString()});save();studentQuizzes()}
function review(){let qid=$('reviewQuiz')?.value||state.quizzes[0]?.id||'',subs=state.submissions.filter(s=>!qid||s.quizId===qid);if(!reviewId||!subs.find(s=>s.id===reviewId))reviewId=subs[0]?.id||null;let sub=subs.find(s=>s.id===reviewId),q=state.quizzes.find(x=>x.id===qid);$('view').innerHTML=`<div class="reviewGrid"><div class="card reviewList"><select id="reviewQuiz" class="select" onchange="reviewId=null;review()">${state.quizzes.map(q=>`<option value="${q.id}" ${q.id===qid?'selected':''}>${esc(q.title)}</option>`).join('')}</select><div style="margin-top:12px">${subs.map(s=>`<div class="reviewItem ${s.id===reviewId?'active':''}" onclick="reviewId='${s.id}';review()"><b>${esc(student(s.studentId)?.name||'Unknown')}</b><br><small>${s.submittedAt}</small><br><span class="badge ${s.pending&&!s.teacherMarked?'gold':'green'}">${s.pending&&!s.teacherMarked?'Review needed':'Marked'}</span> <b>${s.score}/${s.total}</b></div>`).join('')||'<div class="empty">No submission yet.</div>'}</div></div><div>${sub&&q?reviewHTML(q,sub):'<div class="card empty">Select a submission.</div>'}</div></div>`;setTimeout(()=>typeset($('view')),100)}
function reviewHTML(q,sub){let st=student(sub.studentId);return `<div class="card"><h2>${esc(st?.name||'Student')}</h2><p><b>${esc(q.title)}</b> • Score: ${sub.score}/${sub.total}</p><button class="btn green" onclick="saveMarks('${sub.id}')">Save Awarded Marks</button></div>${q.questions.map((qq,i)=>reviewQ(q,sub,qq,i)).join('')}`}function renderFile(f){if(!f)return '';if(f.type?.startsWith('image/'))return `<p>${esc(f.name)}</p><img class="filePreview" src="${f.data}">`;if(f.type?.includes('pdf'))return `<p>${esc(f.name)}</p><embed class="pdfPreview" src="${f.data}" type="application/pdf">`;return `<a href="${f.data}" download="${esc(f.name)}">${esc(f.name)}</a>`}function ansRender(qq,a){if(!a)return 'No answer';if(a.type==='mcq')return `${'ABCD'[a.choice]} ${opRender(qq.options[a.choice])}`;if(a.type==='fill')return `${fmt(a.text)} ${mRender(a.math)}`;return `${a.text?fmt(a.text):''} ${mRender(a.math)} ${renderFile(a.file)}`}
function promptText(qq,a){return `Mark this ${qq.type} ${qq.marks}-mark Mathematics/Additional Mathematics answer.\n\nQUESTION:\n${strip(qRender(qq))}\n\nMARKING GUIDE / ACCEPTED ANSWER:\n${qq.rubric||qq.acceptedText||''} ${qq.rubricMath||qq.acceptedMath||''}\n\nSTUDENT ANSWER:\n${a?.text||''} ${a?.math||''}\n${a?.file?'Student uploaded a file named '+a.file.name+'. Review the uploaded image/PDF if available.':''}\n\nReturn:\nMARK: [number out of ${qq.marks}]\nFEEDBACK: [brief reason]`}function strip(html){let d=document.createElement('div');d.innerHTML=html;return d.textContent||''}
function reviewQ(q,sub,qq,i){let a=sub.answers[qq.id],mark=a?.teacherMark??0;return `<div class="card"><span class="qType">${qTypeName(qq.type)}</span><h3>Q${i+1} (${qq.marks} marks)</h3><div>${qRender(qq)}</div><div class="notice"><b>Student answer:</b><br>${ansRender(qq,a)}</div><label class="label">ChatGPT marking prompt</label><textarea id="prompt_${qq.id}" class="aiPrompt" readonly>${esc(promptText(qq,a))}</textarea><div class="toolbar"><button class="btn ghost" onclick="copyPrompt('prompt_${qq.id}')">Copy Prompt</button><button class="btn light" onclick="pasteFeedback('${qq.id}')">Paste AI Feedback</button></div><label class="label">Feedback</label><textarea id="fb_${qq.id}" class="input" style="min-height:70px">${esc(a?.feedback||'')}</textarea><label class="label">Awarded mark</label><input id="mark_${qq.id}" class="input" type="number" min="0" max="${qq.marks}" value="${mark}" style="max-width:120px"></div>`}
function copyPrompt(pid){let el=$(pid);el.select();document.execCommand('copy');toast('Prompt copied')}function pasteFeedback(qid){let t=prompt('Paste ChatGPT feedback. If it has MARK:, I will read it.');if(t===null)return;$('fb_'+qid).value=t;let m=t.match(/MARK:\s*([0-9]+(?:\.[0-9]+)?)/i);if(m)$('mark_'+qid).value=m[1]}function saveMarks(subid){let sub=state.submissions.find(s=>s.id===subid),q=state.quizzes.find(x=>x.id===sub.quizId),score=0;q.questions.forEach(qq=>{let a=sub.answers[qq.id];let m=+$('mark_'+qq.id).value||0;m=Math.max(0,Math.min(qq.marks,m));a.teacherMark=m;a.feedback=$('fb_'+qq.id).value||'';score+=m});sub.score=score;sub.pending=false;sub.teacherMarked=true;save();toast('Marks saved');review()}
function reports(){let cl=$('repClass')?.value||state.classes[0],sub=$('repSubject')?.value||subjectForClass(cl),sem=$('repSem')?.value||state.currentSemester,list=state.students.filter(s=>s.className===cl),sid=$('repStudent')?.value||list[0]?.id,s=student(sid);let total=studentTotal(sid,sub,sem),g=grade(total);$('view').innerHTML=`<div class="card noPrint"><div class="grid four"><select id="repClass" class="select" onchange="reports()">${classOpts(cl)}</select><select id="repSubject" class="select" onchange="reports()">${subjOpts(sub)}</select><select id="repSem" class="select" onchange="reports()">${semOpts(sem)}</select><select id="repStudent" class="select" onchange="reports()">${list.map(x=>`<option value="${x.id}" ${x.id===sid?'selected':''}>${esc(x.name)}</option>`).join('')}</select></div><button class="btn gold" onclick="window.print()">Print</button></div><div class="card">${reportHTML(s,sub,sem,total,g)}</div>`}function studentTotal(sid,sub,sem){let qs=state.quizzes.filter(q=>q.subject===sub&&q.semester===sem&&(q.className==='ALL'||q.className===student(sid).className));let subs=state.submissions.filter(s=>s.studentId===sid&&qs.find(q=>q.id===s.quizId));let pts=subs.reduce((a,s)=>a+s.score,0),tot=subs.reduce((a,s)=>a+s.total,0);return tot?pts/tot*100:0}function grade(sc){return state.grading.find(g=>sc>=g.min&&sc<=g.max)||state.grading.at(-1)}
function reportHTML(s,sub,sem,total,g){return `<div class="reportShell"><div class="securityBand"></div><div class="reportHead"><img src="${state.school.logo}"><div><span class="badge gold">Personal Subject Report</span><h2>${esc(state.school.name)}</h2><p><b>${esc(sub)}</b> • ${esc(sem)} • ${esc(state.academicYear)}</p><p>Prepared by ${esc(state.school.teacher)}. This is not the school all-subject official report card.</p></div><div><b>VERIFY</b><br>${Math.abs((s.id+sub+sem).split('').reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0,0)).toString(36).toUpperCase()}</div></div><div class="reportBody"><p><b>Student:</b> ${esc(s.name)} • <b>Code:</b> ${esc(s.code)} • <b>Class:</b> ${esc(s.className)}</p><div class="metricGrid"><div class="metric"><span>Total</span><b>${total.toFixed(2)}%</b></div><div class="metric"><span>Grade</span><b>${g.grade}</b></div><div class="metric"><span>Point</span><b>${g.point}</b></div><div class="metric"><span>Remark</span><b style="font-size:18px">${g.remark}</b></div><div class="metric"><span>Subject</span><b style="font-size:16px">${esc(sub)}</b></div></div><div class="sigArea"><div class="sigBox"><img src="${state.school.signature}"><div class="sigLine">${esc(state.school.teacher)}</div></div><div class="sigBox"><div class="sigLine">Parent / Guardian</div></div></div></div></div>`}function studentReport(){let s=student(currentStudentId),sub=subjectForClass(s.className),sem=state.currentSemester,total=studentTotal(s.id,sub,sem),g=grade(total);$('view').innerHTML=`<div class="card">${reportHTML(s,sub,sem,total,g)}</div>`}
function settings(){$('view').innerHTML=`<div class="card"><div class="grid two"><div><label class="label">Student access code</label><input id="setCode" class="input" value="${esc(state.studentAccessCode)}"></div><div><label class="label">Admin password</label><input id="setPass" class="input" type="password" placeholder="Leave blank"></div></div><button class="btn green" onclick="saveSettings()">Save Settings</button></div>`}function saveSettings(){state.studentAccessCode=$('setCode').value.trim()||'AMEST';if($('setPass').value.trim())state.adminPassword=$('setPass').value.trim();save();toast('Settings saved')}function backup(){$('view').innerHTML=`<div class="card"><button class="btn green" onclick="download('backup.json',JSON.stringify(state,null,2),'application/json')">Download Backup</button><label class="btn ghost" for="restoreFile">Restore</label><input id="restoreFile" class="hidden" type="file" accept="application/json" onchange="restore(event)"></div>`}function restore(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{state=JSON.parse(r.result);save();show('dashboard')};r.readAsText(f)}function download(n,c,t){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click()}
init();
</script>
<script>
/* Final fixes: marking tools, student-shared marked scripts, and assessment component mapping */
function ensureComponents(){
  state.components = state.components || [
    {id:'exam',name:'Examination',weight:70,maxScore:100},
    {id:'class',name:'Class Exercise',weight:10,maxScore:10},
    {id:'homework',name:'Homework',weight:5,maxScore:10},
    {id:'assignment',name:'Assignment',weight:5,maxScore:10},
    {id:'project',name:'Project Work',weight:5,maxScore:20},
    {id:'group',name:'Group Work',weight:5,maxScore:20}
  ];
  state.quizzes.forEach(q=>{ if(!q.componentId) q.componentId = 'assignment'; });
}
ensureComponents();
save();

function compName(cid){return (state.components||[]).find(c=>c.id===cid)?.name || 'Assignment';}
function compOpts(sel='assignment'){
  return (state.components||[]).map(c=>`<option value="${esc(c.id)}" ${c.id===sel?'selected':''}>${esc(c.name)} — ${c.weight}%</option>`).join('');
}

/* Add Components page to the admin menu */
buildNav = function(){
  let items = role==='admin'
    ? [['dashboard','Dashboard'],['students','Students'],['quizBuilder','Quiz Builder'],['components','Assessment Components'],['review','Review / Marking'],['reports','Reports'],['settings','Settings'],['backup','Backup']]
    : [['studentHome','My Dashboard'],['studentQuizzes','Take Quiz'],['studentReport','My Report']];
  $('nav').innerHTML = items.map(x=>`<button data-v="${x[0]}" onclick="show('${x[0]}')">${x[1]}</button>`).join('') + `<button onclick="logout()">Logout</button>`;
}
const oldShowFinal = show;
show = function(v){
  if(v==='components'){
    document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
    topInfo();
    $('pageTitle').textContent='Assessment Components';
    $('pageSub').textContent='Update the components used for report calculation and quiz marks.';
    components();
    return;
  }
  oldShowFinal(v);
}
function components(){
  ensureComponents();
  $('view').innerHTML=`<div class="card"><div class="kicker">Assessment components and weights</div><p class="notice">When you mark a quiz, choose the component it belongs to. The subject report uses these component weights.</p><div class="tableWrap"><table><thead><tr><th>Component</th><th>Weight %</th><th>Max Mark</th><th>Action</th></tr></thead><tbody>${state.components.map((c,i)=>`<tr><td><input class="input" value="${esc(c.name)}" onchange="state.components[${i}].name=this.value;save()"></td><td><input class="input" type="number" value="${c.weight}" onchange="state.components[${i}].weight=+this.value;save()"></td><td><input class="input" type="number" value="${c.maxScore||100}" onchange="state.components[${i}].maxScore=+this.value;save()"></td><td><button class="btn red" onclick="removeComponent(${i})">Remove</button></td></tr>`).join('')}</tbody></table></div><div class="toolbar"><button class="btn green" onclick="addComponent()">Add Component</button><span class="componentBadge">Total weight: ${state.components.reduce((a,c)=>a+(+c.weight||0),0)}%</span></div></div>`;
}
function addComponent(){state.components.push({id:uid('comp'),name:'New Component',weight:0,maxScore:10});save();components();}
function removeComponent(i){if(confirm('Remove this component? Existing quizzes using it will become Assignment.')){let removed=state.components[i]?.id;state.components.splice(i,1);state.quizzes.forEach(q=>{if(q.componentId===removed)q.componentId='assignment'});save();components();}}

/* Quiz builder now includes assessment component */
quizBuilder = function(){
  ensureComponents();
  let type=$('qType')?.value||'mcq';
  $('view').innerHTML=`<div class="quizShell"><div><div class="card"><div class="grid three"><input id="quizTitle" class="input" placeholder="Quiz title"><select id="quizClass" class="select">${classOptsAll('ALL')}</select><select id="quizSubject" class="select">${subjOpts('Additional Mathematics')}</select></div><div class="grid three" style="margin-top:10px"><select id="quizSem" class="select">${semOpts()}</select><select id="quizComponent" class="select">${compOpts('assignment')}</select><select id="publishNow" class="select"><option value="yes">Publish immediately to students</option><option value="no">Save as draft</option></select></div></div><div class="qCard"><div class="qHead"><h3>Question ${draft.length+1}</h3><select id="qType" class="select" style="max-width:250px" onchange="$('fields').innerHTML=typeFields(this.value);setTimeout(()=>typeset($('fields')),100)"><option value="mcq">Multiple choice</option><option value="fill">Fill-in answer</option><option value="theory">Theory / Essay</option><option value="upload">Upload scanned solution</option></select></div><label class="label">Question text</label><textarea id="qText" placeholder="Type question statement"></textarea><label class="label">Mathematics equation</label>${mf('qMath','Type equation here')}${tools()}<div id="fields">${typeFields(type)}</div><div class="toolbar"><button class="btn green" onclick="addQuestion()">Add another question</button><button class="btn gold" onclick="saveQuiz()">Save Quiz</button></div></div><div class="card"><div class="kicker">Saved quizzes — visible immediately after saving</div>${savedQuizTable()}</div></div><div class="sticky"><div class="card"><div class="kicker">Questions added</div><div class="count">${draft.length}</div>${draftBox()}</div></div></div>`;
  setTimeout(()=>typeset($('view')),200);
}
saveQuiz = function(){
  ensureComponents();
  let cur=collectQ();
  if(cur)draft.push(cur);
  if(!draft.length)return alert('Add at least one question');
  let qz={id:uid('quiz'),title:$('quizTitle').value.trim()||'Untitled Quiz',className:$('quizClass').value,subject:$('quizSubject').value,semester:$('quizSem').value,componentId:$('quizComponent').value,status:$('publishNow').value==='yes'?'Published':'Draft',questions:clone(draft),createdAt:new Date().toLocaleString()};
  state.quizzes.unshift(qz);draft=[];save();quizBuilder();toast('Quiz saved and shown below');
}
savedQuizTable = function(){
  ensureComponents();
  return state.quizzes.length?`<div class="tableWrap"><table><thead><tr><th>Title</th><th>Class</th><th>Subject</th><th>Component</th><th>Semester</th><th>Questions</th><th>Status</th><th>Action</th></tr></thead><tbody>${state.quizzes.map(q=>`<tr><td><b>${esc(q.title)}</b><br><small>${esc(q.createdAt||'')}</small></td><td>${esc(q.className)}</td><td>${esc(q.subject)}</td><td><span class="componentBadge">${esc(compName(q.componentId||'assignment'))}</span></td><td>${q.semester}</td><td>${q.questions.length}</td><td><span class="badge ${q.status==='Published'?'green':'gold'}">${q.status}</span></td><td><button class="btn light" onclick="toggleQuiz('${q.id}')">${q.status==='Published'?'Unpublish':'Publish'}</button> <button class="btn red" onclick="deleteQuiz('${q.id}')">Delete</button></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">No quiz saved yet.</div>';
}

/* Drawing tools for uploaded image scripts */
function isImageFile(f){return f && (f.type||'').startsWith('image/');}
function initMarkCanvas(qid, subid){
  let sub=state.submissions.find(s=>s.id===subid); if(!sub)return;
  let ans=sub.answers[qid]; if(!ans || !isImageFile(ans.file))return;
  let canvas=$('markCanvas_'+qid); if(!canvas)return;
  let ctx=canvas.getContext('2d');
  let img=new Image();
  img.onload=function(){
    let maxW=Math.min(900, canvas.parentElement?.clientWidth?canvas.parentElement.clientWidth-24:900);
    let scale=Math.min(1, maxW/img.width);
    canvas.width=Math.max(1, Math.round(img.width*scale));
    canvas.height=Math.max(1, Math.round(img.height*scale));
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
  };
  img.src=ans.file.markedData || ans.file.data;

  let drawing=false, tool='pen', size=4, lastPoint=null;
  canvas.style.touchAction='none';
  canvas.style.msTouchAction='none';
  canvas.style.userSelect='none';

  function eventPoint(e){
    let r=canvas.getBoundingClientRect();
    let p=e.touches?e.touches[0]:(e.changedTouches?e.changedTouches[0]:e);
    return {
      x:(p.clientX-r.left)*(canvas.width/r.width),
      y:(p.clientY-r.top)*(canvas.height/r.height),
      pressure:(e.pressure && e.pressure>0 ? e.pressure : 0.55)
    };
  }
  function applyTool(point){
    ctx.lineCap='round';
    ctx.lineJoin='round';
    if(tool==='eraser'){
      ctx.globalCompositeOperation='destination-out';
      ctx.strokeStyle='rgba(0,0,0,1)';
      ctx.lineWidth=22;
    }else{
      ctx.globalCompositeOperation='source-over';
      ctx.strokeStyle=tool==='pencil'?'#172033':'#d92d20';
      let pressure = Math.max(.35, Math.min(1, point.pressure || .55));
      ctx.lineWidth=(tool==='pencil'?2.2:size) * pressure;
    }
  }
  function beginDraw(e){
    if(e.button !== undefined && e.button !== 0) return;
    drawing=true;
    lastPoint=eventPoint(e);
    applyTool(lastPoint);
    ctx.beginPath();
    ctx.moveTo(lastPoint.x,lastPoint.y);
    try{ canvas.setPointerCapture && e.pointerId !== undefined && canvas.setPointerCapture(e.pointerId); }catch(err){}
    e.preventDefault();
  }
  function draw(e){
    if(!drawing) return;
    let p=eventPoint(e);
    applyTool(p);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
    lastPoint=p;
    e.preventDefault();
  }
  function stopDraw(e){
    if(!drawing) return;
    drawing=false;
    lastPoint=null;
    ctx.globalCompositeOperation='source-over';
    try{ canvas.releasePointerCapture && e?.pointerId !== undefined && canvas.releasePointerCapture(e.pointerId); }catch(err){}
    e?.preventDefault?.();
  }

  // Pointer Events support stylus pens, writing pads, touchscreens, and mouse in modern browsers.
  canvas.onpointerdown=beginDraw;
  canvas.onpointermove=draw;
  canvas.onpointerup=stopDraw;
  canvas.onpointercancel=stopDraw;
  canvas.onpointerleave=stopDraw;

  // Fallback for older browsers that only support mouse/touch events.
  canvas.onmousedown=beginDraw;
  canvas.onmousemove=draw;
  window.addEventListener('mouseup',stopDraw);
  canvas.ontouchstart=beginDraw;
  canvas.ontouchmove=draw;
  canvas.ontouchend=stopDraw;
  canvas.ontouchcancel=stopDraw;

  canvas.dataset.ready='yes';
  window['setTool_'+qid]=function(t){tool=t;document.querySelectorAll('.tool_'+qid).forEach(b=>b.classList.remove('active'));$('tool_'+qid+'_'+t)?.classList.add('active');}
  window['clearMarks_'+qid]=function(){let base=new Image();base.onload=function(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(base,0,0,canvas.width,canvas.height)};base.src=ans.file.data;}
}
function saveMarkedScript(qid,subid,share=false){
  let sub=state.submissions.find(s=>s.id===subid); if(!sub)return;
  let ans=sub.answers[qid]; if(!ans || !ans.file)return;
  let canvas=$('markCanvas_'+qid);
  if(canvas && isImageFile(ans.file)){
    ans.file.markedData=canvas.toDataURL('image/png');
  }
  if(share) ans.file.markedShared=true;
  save();
  toast(share?'Marked script shared to student.':'Marked script saved.');
  review();
}
function markedToolsHTML(qid,subid,file){
  if(!file)return '';
  if(isImageFile(file)){
    return `<div class="markTools"><button id="tool_${qid}_pen" class="tool_${qid} active" onclick="setTool_${qid}('pen')">Red Pen</button><button id="tool_${qid}_pencil" class="tool_${qid}" onclick="setTool_${qid}('pencil')">Pencil</button><button id="tool_${qid}_eraser" class="tool_${qid}" onclick="setTool_${qid}('eraser')">Eraser</button><button onclick="clearMarks_${qid}()">Clear Marks</button><button class="btn green" onclick="saveMarkedScript('${qid}','${subid}',false)">Save Marked Script</button><button class="btn gold" onclick="saveMarkedScript('${qid}','${subid}',true)">Share Marked Script to Student</button></div><div class="markCanvasWrap"><canvas id="markCanvas_${qid}" class="markCanvas"></canvas></div>`;
  }
  return `<div class="notice">PDF uploaded. You can preview and award marks here. For direct red-pen marking, ask the student to upload the solution as an image/photo. The feedback and awarded mark will still be shared after saving.</div>`;
}

/* Enhanced review screen */
reviewHTML = function(q,sub){
  let st=student(sub.studentId);
  let selectedComp=sub.componentId || q.componentId || 'assignment';
  return `<div class="card"><h2>${esc(st?.name||'Student')}</h2><p><b>${esc(q.title)}</b> • Score: ${sub.score}/${sub.total}</p><div class="grid two"><div><label class="label">Record this assessment under component</label><select id="reviewComponent" class="select">${compOpts(selectedComp)}</select></div><div><label class="label">Subject</label><input class="input" value="${esc(q.subject)}" disabled></div></div><div class="toolbar"><button class="btn green" onclick="saveMarks('${sub.id}')">Save Awarded Marks</button></div></div>${q.questions.map((qq,i)=>reviewQ(q,sub,qq,i)).join('')}`;
}
reviewQ = function(q,sub,qq,i){
  let a=sub.answers[qq.id],mark=a?.teacherMark??0;
  let markArea = (a?.file)? markedToolsHTML(qq.id,sub.id,a.file) : '';
  setTimeout(()=>initMarkCanvas(qq.id,sub.id),150);
  return `<div class="card"><span class="qType">${qTypeName(qq.type)}</span><h3>Q${i+1} (${qq.marks} marks)</h3><div>${qRender(qq)}</div><div class="notice"><b>Student answer:</b><br>${ansRender(qq,a)}</div>${markArea}<label class="label">ChatGPT marking prompt</label><textarea id="prompt_${qq.id}" class="aiPrompt" readonly>${esc(promptText(qq,a))}</textarea><div class="toolbar"><button class="btn ghost" onclick="copyPrompt('prompt_${qq.id}')">Copy Prompt</button><button class="btn light" onclick="pasteFeedback('${qq.id}')">Paste AI Feedback</button></div><label class="label">Feedback</label><textarea id="fb_${qq.id}" class="input" style="min-height:70px">${esc(a?.feedback||'')}</textarea><label class="label">Awarded mark</label><input id="mark_${qq.id}" class="input" type="number" min="0" max="${qq.marks}" value="${mark}" style="max-width:120px"></div>`;
}
saveMarks = function(subid){
  let sub=state.submissions.find(s=>s.id===subid),q=state.quizzes.find(x=>x.id===sub.quizId),score=0;
  let comp=$('reviewComponent')?.value || q.componentId || 'assignment';
  q.componentId=comp; sub.componentId=comp;
  q.questions.forEach(qq=>{
    let a=sub.answers[qq.id];
    let m=+$('mark_'+qq.id).value||0;
    m=Math.max(0,Math.min(qq.marks,m));
    a.teacherMark=m;
    a.feedback=$('fb_'+qq.id).value||'';
    score+=m;
  });
  sub.score=score;sub.pending=false;sub.teacherMarked=true;save();toast('Marks saved and linked to '+compName(comp));review();
}

/* Student can see shared marked scripts */
function renderSharedMarked(q,ans){
  if(ans?.file?.markedShared && ans.file.markedData){
    return `<div class="sharedMark"><b>Marked script from teacher:</b><br><img src="${ans.file.markedData}"></div>`;
  }
  return '';
}
studentQuizzes = function(){
  let qs=availableQuizzes(),qid=$('takeQuizSel')?.value||qs[0]?.id||'',q=state.quizzes.find(x=>x.id===qid),sub=q?state.submissions.find(s=>s.quizId===q.id&&s.studentId===currentStudentId):null;
  $('view').innerHTML=`<div class="card"><select id="takeQuizSel" class="select" onchange="studentQuizzes()">${qs.map(q=>`<option value="${q.id}" ${q.id===qid?'selected':''}>${esc(q.title)} — ${q.questions.length} question(s)</option>`).join('')}</select></div><div class="card">${q?(sub?submissionDetails(q,sub):quizForm(q)):'<div class="empty">No published quiz available for your class and subject.</div>'}</div>`;
  setTimeout(()=>typeset($('view')),100);
}
function submissionDetails(q,sub){
  return `<h2>${esc(q.title)}</h2><div class="notice">Submitted. Current score: <b>${sub.score}/${sub.total}</b>${sub.pending&&!sub.teacherMarked?' • Waiting for marking':''}</div>${q.questions.map((qq,i)=>{let a=sub.answers[qq.id];return `<div class="questionCard"><span class="qType">${qTypeName(qq.type)}</span><h3>Question ${i+1}</h3><div>${qRender(qq)}</div><div><b>Your answer:</b><br>${ansRender(qq,a)}</div>${renderSharedMarked(qq,a)}${a?.feedback?`<div class="notice"><b>Teacher feedback:</b><br>${fmt(a.feedback)}</div>`:''}${a?.teacherMark!=null?`<p><b>Mark awarded:</b> ${a.teacherMark}/${qq.marks}</p>`:''}</div>`}).join('')}`;
}

/* Reports now use weighted assessment components */
studentTotal = function(sid,subj,sem){
  ensureComponents();
  let st=student(sid); if(!st)return 0;
  let relevantSubs=state.submissions.filter(s=>{
    let q=state.quizzes.find(x=>x.id===s.quizId);
    return q && s.studentId===sid && q.subject===subj && q.semester===sem && (q.className==='ALL'||q.className===st.className);
  });
  let totalWeighted=0, totalWeight=0;
  state.components.forEach(c=>{
    let arr=relevantSubs.filter(s=>{
      let q=state.quizzes.find(x=>x.id===s.quizId);
      return (s.componentId || q?.componentId || 'assignment')===c.id;
    });
    let pts=arr.reduce((a,s)=>a+(+s.score||0),0);
    let poss=arr.reduce((a,s)=>a+(+s.total||0),0);
    if(poss>0){
      totalWeighted += (pts/poss*100) * ((+c.weight||0)/100);
      totalWeight += (+c.weight||0);
    }
  });
  return totalWeight? totalWeighted/(totalWeight/100):0;
}
</script>


<script>
/* MathLive + MathJax professional online equation editor */
let activeMLField = 'qFormula';

function safeLatex(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function typesetMath(container=document.body){
  if(window.MathJax && MathJax.typesetPromise){
    MathJax.typesetPromise([container]).catch(err => console.warn('MathJax typeset error:', err));
  }
}
function ml(id){ return document.getElementById(id); }
function focusML(id){ activeMLField = id; setTimeout(()=>{ try{ ml(id)?.focus(); }catch(e){} }, 0); }
function mlValue(id){ return ml(id)?.value || ''; }
function setMlValue(id, value){ let f = ml(id); if(f) f.value = value || ''; }
function insertML(latex){
  let f = ml(activeMLField) || ml('qFormula');
  if(!f){ alert('Click inside a mathematics field first.'); return; }
  try{
    f.focus();
    if(typeof f.insert === 'function') f.insert(latex);
    else f.value = (f.value || '') + latex;
  }catch(e){
    f.value = (f.value || '') + latex;
  }
  updateMLPreview();
}
function showMathKeyboard(){
  let f = ml(activeMLField) || ml('qFormula');
  try{
    f?.focus();
    if(window.mathVirtualKeyboard){
      window.mathVirtualKeyboard.visible = true;
    }
  }catch(e){}
}
function renderLatex(latex, display=false){
  latex = String(latex || '').trim();
  if(!latex) return '';
  return display ? `<div class="renderedMathBlock">\\[${safeLatex(latex)}\\]</div>` : `<span class="renderedMathBlock">\\(${safeLatex(latex)}\\)</span>`;
}
function renderPromptAndLatex(prompt, latex){
  let p = prompt ? `<span class="renderedPrompt">${fmt(prompt)}</span>` : '';
  return p + renderLatex(latex, false);
}
function renderQuestionContent(qq){
  if(qq && qq.mathlive){
    return renderPromptAndLatex(qq.prompt, qq.latex);
  }
  return fmt(qq?.text ?? qq ?? '');
}
function renderOptionContent(op){
  if(op && typeof op === 'object'){
    return renderPromptAndLatex(op.prompt, op.latex);
  }
  return fmt(op ?? '');
}
function renderExplanation(qq){
  if(qq && qq.mathlive){
    let p = qq.explanationText ? fmt(qq.explanationText) : '';
    let m = qq.explanationLatex ? renderLatex(qq.explanationLatex, false) : '';
    return p || m ? (p + m) : 'No explanation added.';
  }
  return fmt(qq?.explanation || 'No explanation added.');
}
function mathliveFieldHTML(id, placeholder){
  return `<math-field id="${id}" class="smartMathField" virtual-keyboard-mode="manual" smart-fence smart-mode onfocus="focusML('${id}')" onclick="focusML('${id}')" oninput="updateMLPreview()" placeholder="${esc(placeholder)}"></math-field>`;
}
function mathliveToolbarHTML(){
  return `<div class="mathliveToolbar">
    <button type="button" onclick="showMathKeyboard()">Open Math Keyboard</button>
    <button type="button" onclick="insertML('\\\\frac{}{}')">Fraction</button>
    <button type="button" onclick="insertML('\\\\sqrt{}')">Square root</button>
    <button type="button" onclick="insertML('^{}')">Exponent</button>
    <button type="button" onclick="insertML('_{}')">Subscript</button>
    <button type="button" onclick="insertML('\\\\log_{}()')">Log with base</button>
    <button type="button" onclick="insertML('e^{}')">Exponential</button>
    <button type="button" onclick="insertML('\\\\sum_{}^{}')">Summation</button>
    <button type="button" onclick="insertML('\\\\int_{}^{}')">Integral</button>
    <button type="button" onclick="insertML('\\\\frac{\\\\sqrt{x^{2}+1}}{\\\\log_{2}(x)}')">Nested example</button>
    <button type="button" onclick="insertML('\\\\frac{-b\\\\pm\\\\sqrt{b^{2}-4ac}}{2a}')">Quadratic formula</button>
  </div>`;
}
function updateMLPreview(){
  let qprev = $('qPreview');
  if(qprev){
    let p = $('qPrompt')?.value || '';
    let l = mlValue('qFormula');
    qprev.innerHTML = renderPromptAndLatex(p,l) || '<span style="color:var(--muted)">Question preview will appear here.</span>';
    typesetMath(qprev);
  }
  ['opA','opB','opC','opD','explain'].forEach(id=>{
    let box = $(id+'Preview');
    if(box){
      let l = mlValue(id+'Formula');
      box.innerHTML = l ? renderLatex(l,false) : '<span style="color:var(--muted)">Preview</span>';
      typesetMath(box);
    }
  });
}
function clearMLFields(){
  ['qFormula','opAFormula','opBFormula','opCFormula','opDFormula','explainFormula'].forEach(id=>setMlValue(id,''));
  ['qPrompt','opAText','opBText','opCText','opDText','explainText'].forEach(id=>{ if($(id)) $(id).value=''; });
  updateMLPreview();
}
quizzes = function(){

  $('view').innerHTML=`<div class="grid two"><div class="card"><div class="kicker">Create quiz or task</div>

  <hr style="border:0;border-top:1px solid var(--line);margin:15px 0">
  <div class="mathlibNotice"><b>Professional online equation editor:</b> This version uses MathLive for equation input and MathJax for final rendering. It supports nested structures such as fractions inside square roots, square roots inside fractions, powers, logarithms, integrals, summations and more.</div>
  <label class="small" style="margin-top:12px">Question wording / instruction</label>
  <textarea id="qPrompt" class="input mathQuestionText" placeholder="Example: Simplify the following expression" oninput="updateMLPreview()"></textarea>
  <div class="mathliveEditorBox"><div class="editorTitle">Question equation editor</div>${mathliveFieldHTML('qFormula','Type equation here')}${mathliveToolbarHTML()}<div id="qPreview" class="mathlivePreview"><span style="color:var(--muted)">Question preview will appear here.</span></div></div>
  <label class="small" style="margin-top:12px">Answer options</label>
  <div class="optionMathGrid">

    <div class="optionMathCard"><label class="small">Option B text</label><input id="opBText" class="input" placeholder="Optional text" oninput="updateMLPreview()"><div class="editorTitle">Option B equation</div>${mathliveFieldHTML('opBFormula','Option B equation')}<div id="opBPreview" class="mathlivePreview"></div></div>
    <div class="optionMathCard"><label class="small">Option C text</label><input id="opCText" class="input" placeholder="Optional text" oninput="updateMLPreview()"><div class="editorTitle">Option C equation</div>${mathliveFieldHTML('opCFormula','Option C equation')}<div id="opCPreview" class="mathlivePreview"></div></div>

  <div class="toolbar"><button class="btn green" onclick="addQuestionToDraft()">Add Question</button><button class="btn gold" onclick="saveQuiz()">Save Quiz</button></div>
  </div><div class="card"><div class="kicker">Draft questions</div><div id="draftBox">${draftHTML()}</div></div></div>
  <div class="card"><div class="kicker">Saved quizzes and tasks</div><div class="tableWrap"><table><thead><tr><th>Title</th><th>Class</th><th>Subject</th><th>Semester</th><th>Questions</th><th>Status</th><th>Action</th></tr></thead><tbody>${state.quizzes.map(q=>`<tr><td><b>${esc(q.title)}</b></td><td>${esc(q.className)}</td><td>${esc(q.subject)}</td><td>${esc(q.semester)}</td><td>${q.questions.length}</td><td><span class="badge ${q.status==='Published'?'green':'gold'}">${esc(q.status)}</span></td><td><button class="btn light" onclick="toggleQuiz('${q.id}')">${q.status==='Published'?'Unpublish':'Publish'}</button> <button class="btn light" onclick="toggleCorrection('${q.id}')">${q.corrections?'Hide Corrections':'Show Corrections'}</button></td></tr>`).join('')}</tbody></table></div></div>`;
  setTimeout(()=>{ updateMLPreview(); typesetMath($('view')); }, 300);
}

<script>
/* Branding, subject-based student view, and profile pictures */
let loginSubjectFilter = 'Additional Mathematics';
let loginClassFilter = 'ALL';

function initials(name){
  return String(name||'?').split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase() || '?';
}
function photoHTML(s, cls=''){
  if(s?.photo) return `<img class="studentPhoto ${cls}" src="${s.photo}" alt="">`;
  return `<span class="studentPhoto placeholder ${cls}">${esc(initials(s?.name))}</span>`;

let photoCrop = {studentId:null, returnView:'students', img:null, scale:1, x:0, y:0, dragging:false, lastX:0, lastY:0};

function chooseStudentPhoto(studentId, returnView='students', camera=false){
  let inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/*';
  inp.className='hiddenPhotoInput';

function openCropper(studentId, dataUrl, returnView='students'){
  let img=new Image();
  img.onload=function(){
    photoCrop={studentId,returnView,img,scale:1,x:0,y:0,dragging:false,lastX:0,lastY:0};
    showCropModal();
    drawCropCanvas();
  };
  img.src=dataUrl;
}
function showCropModal(){
  let modal=document.createElement('div');
  modal.id='cropModal';
  modal.className='cropModal';
  modal.innerHTML=`<div class="cropBox"><h3>Crop Student Picture</h3><p style="color:var(--muted);margin-top:0">Move the picture, adjust zoom, then click Insert Picture.</p><div class="cropStage"><div><canvas id="cropCanvas" class="cropCanvas" width="480" height="480"></canvas></div><div class="cropControls"><img id="cropPreview" class="cropPreview"><label class="label">Zoom</label><input id="cropZoom" type="range" min="0.7" max="3" step="0.05" value="1" oninput="photoCrop.scale=+this.value;drawCropCanvas()"><div class="toolbar"><button class="btn green" onclick="insertCroppedPhoto()">Insert Picture</button><button class="btn ghost" onclick="closeCropper()">Cancel</button></div></div></div></div>`;
  document.body.appendChild(modal);
  let c=$('cropCanvas');
  c.onpointerdown=function(e){photoCrop.dragging=true;photoCrop.lastX=e.clientX;photoCrop.lastY=e.clientY;try{c.setPointerCapture(e.pointerId)}catch(err){} e.preventDefault();};
  c.onpointermove=function(e){if(!photoCrop.dragging)return;photoCrop.x+=e.clientX-photoCrop.lastX;photoCrop.y+=e.clientY-photoCrop.lastY;photoCrop.lastX=e.clientX;photoCrop.lastY=e.clientY;drawCropCanvas();e.preventDefault();};
  c.onpointerup=c.onpointercancel=function(e){photoCrop.dragging=false;try{c.releasePointerCapture(e.pointerId)}catch(err){}};
}
function drawCropCanvas(){
  let c=$('cropCanvas'); if(!c||!photoCrop.img)return;
  let ctx=c.getContext('2d'), W=c.width, H=c.height, img=photoCrop.img;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f5f7fa';ctx.fillRect(0,0,W,H);
  let base=Math.max(W/img.width,H/img.height);
  let scale=base*photoCrop.scale;
  let iw=img.width*scale, ih=img.height*scale;
  let x=(W-iw)/2+photoCrop.x, y=(H-ih)/2+photoCrop.y;
  ctx.drawImage(img,x,y,iw,ih);
  // dark outer circle guide
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();ctx.rect(0,0,W,H);ctx.arc(W/2,H/2,W*0.42,0,Math.PI*2,true);ctx.fill('evenodd');
  ctx.restore();
  ctx.strokeStyle='#f2c94c';ctx.lineWidth=5;ctx.beginPath();ctx.arc(W/2,H/2,W*0.42,0,Math.PI*2);ctx.stroke();
  // preview
  let out=document.createElement('canvas'), size=420;out.width=size;out.height=size;let o=out.getContext('2d');
  o.fillStyle='#fff';o.fillRect(0,0,size,size);
  let cropSize=W*0.84, sx=(W-cropSize)/2, sy=(H-cropSize)/2;
  o.drawImage(c,sx,sy,cropSize,cropSize,0,0,size,size);
  $('cropPreview').src=out.toDataURL('image/jpeg',0.92);
}

<script>
/* Final fix: no student passcode + direct camera capture then crop/insert */
let activeCameraStream = null;
let activeCameraStudentId = null;
let activeCameraReturnView = 'students';

function stopActiveCamera(){
  if(activeCameraStream){
    activeCameraStream.getTracks().forEach(t=>t.stop());
    activeCameraStream=null;
  }
}
function closeDirectCamera(){
  stopActiveCamera();
  $('directCameraModal')?.remove();
}
async function openDirectCamera(studentId, returnView='students'){
  activeCameraStudentId = studentId;
  activeCameraReturnView = returnView;

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    toast('Camera API not available here. Opening phone camera/file picker instead.');
    return openCaptureFileFallback(studentId, returnView);
  }

  let modal=document.createElement('div');
  modal.id='directCameraModal';
  modal.className='directCameraModal';
  modal.innerHTML=`<div class="directCameraBox">
    <h3>Take Student Picture</h3>
    <video id="directCameraVideo" class="directCameraView" autoplay playsinline></video>
    <p class="cameraMessage">Allow camera permission, position the student, then click Capture Picture. After capture, crop and insert.</p>
    <div class="toolbar" style="justify-content:center">
      <button class="btn green" onclick="captureDirectCamera()">Capture Picture</button>
      <button class="btn ghost" onclick="switchDirectCamera()">Switch Camera</button>
      <button class="btn red" onclick="closeDirectCamera()">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(modal);

  try{
    activeCameraStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: window.currentFacingMode || 'environment', width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    $('directCameraVideo').srcObject = activeCameraStream;
  }catch(err){
    closeDirectCamera();
    alert('The browser blocked direct camera access. I will open the camera/file picker instead. If you host the app online, use HTTPS and allow camera permission.');
    openCaptureFileFallback(studentId, returnView);
  }
}
async function switchDirectCamera(){
  window.currentFacingMode = window.currentFacingMode === 'user' ? 'environment' : 'user';
  let sid=activeCameraStudentId, rv=activeCameraReturnView;
  closeDirectCamera();
  await openDirectCamera(sid, rv);
}
function captureDirectCamera(){
  let video=$('directCameraVideo');
  if(!video || !video.videoWidth){
    alert('Camera is not ready yet. Wait a moment and try again.');
    return;
  }
  let canvas=document.createElement('canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
  let data=canvas.toDataURL('image/jpeg',0.92);
  let sid=activeCameraStudentId, rv=activeCameraReturnView;
  closeDirectCamera();
  openCropper(sid, data, rv);
}
function openCaptureFileFallback(studentId, returnView='students'){
  let inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/*';
  inp.setAttribute('capture','environment');
  inp.className='hiddenPhotoInput';
  inp.onchange=function(e){
    let file=e.target.files?.[0]; if(!file)return;
    let r=new FileReader();
    r.onload=()=>openCropper(studentId, r.result, returnView);
    r.readAsDataURL(file);
  };
  document.body.appendChild(inp);
  inp.click();
  setTimeout(()=>inp.remove(),6000);
}

/* Replace previous photo chooser: upload uses gallery, take picture uses direct camera modal */
chooseStudentPhoto = function(studentId, returnView='students', camera=false){
  if(camera) return openDirectCamera(studentId, returnView);
  let inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/*';
  inp.className='hiddenPhotoInput';
  inp.onchange=function(e){
    let file=e.target.files?.[0]; if(!file)return;
    let r=new FileReader();
    r.onload=()=>openCropper(studentId, r.result, returnView);
    r.readAsDataURL(file);
  };
  document.body.appendChild(inp);
  inp.click();
  setTimeout(()=>inp.remove(),5000);
}

<script>
/* CLEAN FINAL QUIZ LOGIC: import structured HTML quizzes, auto-mark MCQs, and publish results only when teacher chooses. */
function cleanSubjectClasses(subject){
  const found = state.subjects.find(s => s.name === subject);
  return found ? found.classes.slice(0,2) : state.classes.slice(0,2);
}
function cleanQuizClasses(q){
  if(Array.isArray(q.classNames) && q.classNames.length) return q.classNames;
  if(q.className === 'ALL') return cleanSubjectClasses(q.subject);
  return q.className ? [q.className] : cleanSubjectClasses(q.subject);
}
function cleanQuizClassDisplay(q){
  return cleanQuizClasses(q).map(esc).join(', ');
}
function cleanSelectedClasses(){
  return Array.from(document.querySelectorAll('.classChoiceCheck:checked')).map(x => x.value).slice(0,2);
}
function cleanUpdateClassChoices(){
  const subject = $('quizSubject')?.value || 'Additional Mathematics';
  const box = $('classChoiceBox');
  if(!box) return;
  box.innerHTML = cleanSubjectClasses(subject).map(c =>
    `<label class="classChoiceItem"><input class="classChoiceCheck" type="checkbox" value="${esc(c)}" checked onchange="cleanLimitClasses()"> ${esc(c)}</label>`
  ).join('');
}
function cleanLimitClasses(){
  const checks = Array.from(document.querySelectorAll('.classChoiceCheck'));
  const selected = checks.filter(x => x.checked);
  if(selected.length > 2){
    selected[selected.length - 1].checked = false;
    alert('A quiz can be assigned to a maximum of two classes.');
  }
}
function cleanGradeSubmission(q, sub){
  let total = 0, score = 0, correct = 0, wrong = 0, manual = 0;
  (q.questions || []).forEach(qq => {
    total += +qq.marks || 1;
    const a = sub.answers?.[qq.id];
    if(qq.type === 'mcq'){
      const ok = !!a && +a.choice === +qq.answer;
      if(ok){ correct++; score += +qq.marks || 1; }
      else wrong++;
    }else if(qq.type === 'fill'){
      if(a?.autoCorrect) score += +qq.marks || 1;
    }else{
      manual++;
      score += +a?.teacherMark || 0;
    }
  });
  return {total, score, correct, wrong, manual};
}
function cleanChoiceText(qq, idx){
  if(idx === undefined || idx === null || idx < 0) return 'No answer';
  return `<b>${'ABCD'[idx]}.</b> ${opRender(qq.options?.[idx] || {text:'',math:''})}`;
}
function cleanNormalizeQuestion(q){
  const type = q.type || 'mcq';
  const out = {id:uid('q'), type, text:q.text || q.question || '', math:q.math || q.latex || '', marks:+(q.marks || 1)};
  if(type === 'mcq'){
    out.options = (q.options || []).map(o => typeof o === 'string' ? {text:o, math:''} : {text:o.text || '', math:o.math || o.latex || ''}).slice(0,4);
    while(out.options.length < 4) out.options.push({text:'', math:''});
    out.answer = typeof q.answer === 'number' ? q.answer : 'ABCD'.indexOf(String(q.answer || 'A').toUpperCase()[0]);
    if(out.answer < 0) out.answer = 0;
  }else if(type === 'fill'){
    out.acceptedText = q.acceptedText || q.answerText || q.answer || '';
    out.acceptedMath = q.acceptedMath || q.answerMath || '';
  }else{
    out.rubric = q.rubric || q.markingGuide || '';
    out.rubricMath = q.rubricMath || '';
  }
  return out;
}
function cleanExtractQuizData(html){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const node = doc.querySelector('#amest-quiz-data, #amest-quiz-json');
  if(node) return JSON.parse(node.textContent.trim());
  const m = html.match(/window\.AMEST_QUIZ_DATA\s*=\s*({[\s\S]*?});/i);
  if(m) return JSON.parse(m[1]);
  return null;
}
function cleanImportHTMLQuiz(e){
  const file = e.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = cleanExtractQuizData(reader.result);
      if(!data || !Array.isArray(data.questions) || !data.questions.length){
        alert('This HTML file does not contain readable AMeST quiz data. Use the “Download HTML Quiz Template” button, let ChatGPT fill that format, and upload it again.');
        return;
      }
      const subject = data.subject || $('quizSubject')?.value || 'Additional Mathematics';
      let classes = (data.classNames || data.classes || cleanSelectedClasses() || cleanSubjectClasses(subject)).slice(0,2);
      if(!classes.length) classes = cleanSubjectClasses(subject);
      const quiz = {
        id: uid('quiz'),
        title: data.title || file.name.replace(/\.html?$/i,'') || 'Imported Quiz',
        subject,
        className: classes.length === cleanSubjectClasses(subject).length ? 'ALL' : classes[0],
        classNames: classes,
        semester: data.semester || $('quizSem')?.value || state.currentSemester,
        componentId: data.componentId || data.component || $('quizComponent')?.value || 'assignment',
        status: data.status || 'Published',
        resultsPublished: false,
        imported: true,
        questions: data.questions.map(cleanNormalizeQuestion),
        createdAt: new Date().toLocaleString()
      };
      state.quizzes.unshift(quiz);
      save();
      quizBuilder();
      toast('HTML quiz imported. Students can now see and answer it.');
    }catch(err){
      alert('The HTML quiz could not be imported clearly: ' + err.message);
    }
  };
  reader.readAsText(file);
}
function downloadQuizHTMLTemplate(){
  const quizData = {
    title: "Sample Mathematics Quiz",
    subject: "Additional Mathematics",
    classes: ["1 AGRIC", "1 SCIENCE"],
    semester: "Semester 1",
    componentId: "assignment",
    status: "Published",
    questions: [
      {
        type: "mcq",
        text: "Simplify the expression.",
        math: "\\frac{\\sqrt{x^{2}+1}}{\\log_{2}(x)}",
        options: [
          {text: "Option A", math: "x^{2}"},
          {text: "Option B", math: "\\sqrt{x}"},
          {text: "Option C", math: "\\frac{x}{2}"},
          {text: "Option D", math: "\\log_{2}(x)"}
        ],
        answer: 0,
        marks: 1
      },
      {
        type: "theory",
        text: "Solve the problem and show all working.",
        math: "\\frac{-b\\pm\\sqrt{b^{2}-4ac}}{2a}",
        rubric: "Award marks for correct substitution, simplification, and final answer.",
        marks: 10
      }
    ]
  };
  const safe = JSON.stringify(quizData, null, 2).replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const template = `<!doctype html>
<html>
<head><meta charset="utf-8"><title>AMeST Importable Quiz</title></head>
<body>
<pre id="amest-quiz-data" style="display:none">${safe}</pre>
<h1>AMeST Importable Quiz</h1>
<p>This file can be uploaded into Isaac's Assessment Portal.</p>
</body>
</html>`;
  download('AMeST_Importable_HTML_Quiz_Template.html', template, 'text/html');
}

  </div><div class="sticky"><div class="card"><div class="kicker">Questions added</div><div class="count">${draft.length}</div>${draftBox()}</div></div></div>`;
  setTimeout(()=>{cleanUpdateClassChoices();typeset($('view'));},200);

saveQuiz = function(){
  ensureComponents?.();
  const cur = collectQ();
  if(cur) draft.push(cur);
  if(!draft.length) return alert('Add at least one question.');
  const subject = $('quizSubject').value;
  let classes = cleanSelectedClasses();
  if(!classes.length) return alert('Select at least one class.');
  const quiz = {
    id: uid('quiz'),
    title: $('quizTitle').value.trim() || 'Untitled Quiz',
    subject,
    className: classes.length === cleanSubjectClasses(subject).length ? 'ALL' : classes[0],
    classNames: classes,
    semester: $('quizSem').value,
    componentId: $('quizComponent')?.value || 'assignment',
    status: $('publishNow').value === 'yes' ? 'Published' : 'Draft',
    resultsPublished: false,
    questions: clone(draft),
    createdAt: new Date().toLocaleString()
  };
  state.quizzes.unshift(quiz);
  draft = [];
  save();
  quizBuilder();
  toast('Quiz saved. Teacher can see scores after submission; students see scores only after you publish them.');
}

function toggleResultsFromBuilder(qid){

/* Student quiz list and automatic submission marking */
availableQuizzes = function(){
  const s = student(currentStudentId);
  const subject = subjectForClass(s.className);
  return state.quizzes.filter(q => q.status === 'Published' && q.subject === subject && cleanQuizClasses(q).includes(s.className));
}
submitQuiz = async function(qid){
  const q = state.quizzes.find(x=>x.id===qid);
  const answers = {};
  let score = 0, total = 0, pending = false;
  for(const qq of q.questions){
    total += +qq.marks || 1;
    if(qq.type === 'mcq'){
      const el = document.querySelector(`input[name="${qq.id}"]:checked`);
      if(!el) return alert('Answer all multiple-choice questions.');
      const choice = +el.value;
      const ok = choice === +qq.answer;
      answers[qq.id] = {type:'mcq', choice, isCorrect:ok, teacherMark: ok ? (+qq.marks || 1) : 0, feedback: ok ? 'Correct answer.' : 'Wrong answer.'};
      if(ok) score += +qq.marks || 1;
    }else if(qq.type === 'fill'){
      const text = document.querySelector(`.fillAns[data-qid="${qq.id}"]`)?.value.trim() || '';
      const math = latex('mathAns_' + qq.id);
      if(!text && !math) return alert('Answer all fill-in questions.');
      const ok = norm(text) === norm(qq.acceptedText) || norm(math) === norm(qq.acceptedMath);
      answers[qq.id] = {type:'fill', text, math, autoCorrect:ok, teacherMark: ok ? (+qq.marks || 1) : 0, feedback: ok ? 'Correct answer.' : 'Check answer.'};
      if(ok) score += +qq.marks || 1;
    }else{
      const text = document.querySelector(`.theoryAns[data-qid="${qq.id}"]`)?.value.trim() || '';
      const math = latex('mathAns_' + qq.id);
      const file = await fileData(document.querySelector(`.fileAns[data-qid="${qq.id}"]`)?.files?.[0]);
      if(qq.type === 'upload' && !file) return alert('Upload the required solution.');
      if(qq.type === 'theory' && !text && !math && !file) return alert('Answer all theory questions.');
      answers[qq.id] = {type:qq.type, text, math, file, teacherMark:0, feedback:''};
      pending = true;
    }
  }
  state.submissions.push({id:uid('sub'), quizId:q.id, studentId:currentStudentId, answers, score, total, pending, teacherMarked:!pending, submittedAt:new Date().toLocaleString()});
  save();
  studentQuizzes();
}
studentQuizzes = function(){
  const qs = availableQuizzes();
  const qid = $('takeQuizSel')?.value || qs[0]?.id || '';
  const q = state.quizzes.find(x=>x.id===qid);
  const sub = q ? state.submissions.find(s=>s.quizId===q.id && s.studentId===currentStudentId) : null;
  $('view').innerHTML = `<div class="card"><select id="takeQuizSel" class="select" onchange="studentQuizzes()">${qs.map(q=>`<option value="${q.id}" ${q.id===qid?'selected':''}>${esc(q.title)} — ${(q.questions||[]).length} question(s)</option>`).join('')}</select></div><div class="card">${q ? (sub ? submissionDetails(q,sub) : quizForm(q)) : '<div class="empty">No published quiz available for your class and subject.</div>'}</div>`;
  setTimeout(()=>typeset($('view')),100);
}
submissionDetails = function(q, sub){
  if(!q.resultsPublished){
    return `<h2>${esc(q.title)}</h2><div class="studentResultHidden">Submitted successfully. Your score is hidden until the teacher publishes the results.</div>`;
  }
  const stats = cleanGradeSubmission(q,sub);
  return `<h2>${esc(q.title)}</h2><div class="notice">Results published. Your score is <b>${stats.score}/${stats.total}</b>.</div>${q.questions.map((qq,i)=>{
    const a = sub.answers[qq.id];
    const ok = qq.type === 'mcq' ? (a && +a.choice === +qq.answer) : !!a?.autoCorrect;
    return `<div class="questionCard ${qq.type==='mcq'?(ok?'correctReview':'wrongReview'):''}">
      <span class="qType">${qTypeName(qq.type)}</span>${qq.type==='mcq' ? (ok ? '<span class="correctTag">Correct</span>' : '<span class="wrongTag">Wrong</span>') : ''}
      <h3>Question ${i+1}</h3><div>${qRender(qq)}</div>
      <div><b>Your answer:</b><br>${ansRender(qq,a)}</div>
      ${qq.type==='mcq'?`<div class="answerPair"><div><b>Your choice</b><br>${cleanChoiceText(qq,a?.choice)}</div><div><b>Correct answer</b><br>${cleanChoiceText(qq,qq.answer)}</div></div>`:''}
      ${typeof renderSharedMarked==='function'?renderSharedMarked(qq,a):''}
      ${a?.feedback?`<div class="notice"><b>Teacher feedback:</b><br>${fmt(a.feedback)}</div>`:''}
      ${a?.teacherMark!=null?`<p><b>Mark awarded:</b> ${a.teacherMark}/${qq.marks}</p>`:''}
    </div>`;
  }).join('')}`;
}

/* Teacher review: automatic MCQ correct/wrong view and publish control */
review = function(){
  const qid = $('reviewQuiz')?.value || state.quizzes[0]?.id || '';
  const subs = state.submissions.filter(s => !qid || s.quizId === qid);
  if(!reviewId || !subs.find(s=>s.id===reviewId)) reviewId = subs[0]?.id || null;
  const sub = subs.find(s=>s.id===reviewId);
  const q = state.quizzes.find(x=>x.id===qid);
  const publishBar = q ? `<div class="publishControlBar"><span class="badge ${q.resultsPublished?'green':'gold'}">${q.resultsPublished?'Results Published':'Results Hidden'}</span><button class="btn ${q.resultsPublished?'ghost':'green'}" onclick="toggleReviewResults('${q.id}')">${q.resultsPublished?'Hide Results from Students':'Publish Results for Students'}</button></div>` : '';
  $('view').innerHTML = `<div class="reviewGrid"><div class="card reviewList"><select id="reviewQuiz" class="select" onchange="reviewId=null;review()">${state.quizzes.map(q=>`<option value="${q.id}" ${q.id===qid?'selected':''}>${esc(q.title)}</option>`).join('')}</select>${publishBar}<div style="margin-top:12px">${subs.map(s=>{
    const st = student(s.studentId), qx = state.quizzes.find(x=>x.id===s.quizId), stats = qx ? cleanGradeSubmission(qx,s) : {score:s.score,total:s.total,correct:0,wrong:0};
    return `<div class="reviewItem ${s.id===reviewId?'active':''}" onclick="reviewId='${s.id}';review()"><b>${esc(st?.name||'Unknown')}</b><br><small>${esc(st?.className||'')} • ${s.submittedAt}</small><br><span class="badge green">Marked automatically</span> <b>${stats.score}/${stats.total}</b><br><small>Correct: ${stats.correct} • Wrong: ${stats.wrong}</small></div>`;
  }).join('') || '<div class="empty">No submission yet.</div>'}</div></div><div>${sub&&q ? reviewHTML(q,sub) : '<div class="card empty">Select a submission to review.</div>'}</div></div>`;
  setTimeout(()=>typeset($('view')),100);
}
function toggleReviewResults(qid){
  const q = state.quizzes.find(x=>x.id===qid);
  if(!q) return;
  q.resultsPublished = !q.resultsPublished;
  save();
  toast(q.resultsPublished ? 'Results published to students.' : 'Results hidden from students.');
  review();
}
reviewHTML = function(q, sub){
  const st = student(sub.studentId);
  const stats = cleanGradeSubmission(q,sub);
  const selectedComp = sub.componentId || q.componentId || 'assignment';
  return `<div class="card">
    <div class="markingStudentHeader">${typeof photoBigHTML==='function'?photoBigHTML(st,'markingStudentPhoto'):''}<div>
      <h2 style="margin:0 0 8px;color:var(--navy)">${esc(st?.name||'Student')}</h2>
      <div class="markingIdentityBox"><p><b>Class:</b> ${esc(st?.className||'')}</p><p><b>Subject:</b> ${esc(q.subject)}</p><p><b>Assessment:</b> ${esc(q.title)}</p></div>
    </div></div>
    <div class="resultSummaryGrid"><div class="resultSummaryBox"><span>Total Score</span><b>${stats.score}/${stats.total}</b></div><div class="resultSummaryBox"><span>MCQ Correct</span><b>${stats.correct}</b></div><div class="resultSummaryBox"><span>MCQ Wrong</span><b>${stats.wrong}</b></div><div class="resultSummaryBox"><span>Student View</span><b style="font-size:16px">${q.resultsPublished?'Published':'Hidden'}</b></div></div>
    <div class="grid two"><div><label class="label">Assessment component</label><select id="reviewComponent" class="select">${typeof compOpts==='function'?compOpts(selectedComp):''}</select></div><div><label class="label">Publish results</label><button class="btn ${q.resultsPublished?'ghost':'green'}" onclick="toggleReviewResults('${q.id}')">${q.resultsPublished?'Hide Results from Students':'Publish Results for Students'}</button></div></div>
    <div class="toolbar"><button class="btn green" onclick="saveMarks('${sub.id}')">Save / Update Marks</button></div>
  </div>${q.questions.map((qq,i)=>reviewQ(q,sub,qq,i)).join('')}`;
}
reviewQ = function(q, sub, qq, i){
  const a = sub.answers[qq.id] || {};
  if(qq.type === 'mcq'){
    const ok = +a.choice === +qq.answer;
    return `<div class="card ${ok?'correctReview':'wrongReview'}"><span class="qType">Multiple Choice</span>${ok?'<span class="correctTag">Correct</span>':'<span class="wrongTag">Wrong</span>'}<h3>Question ${i+1} (${qq.marks} marks)</h3><div>${qRender(qq)}</div><div class="answerPair"><div><b>Student selected</b><br>${cleanChoiceText(qq,a.choice)}</div><div><b>Correct answer</b><br>${cleanChoiceText(qq,qq.answer)}</div></div><p><b>Automatic mark:</b> ${a.teacherMark}/${qq.marks}</p></div>`;
  }
  if(qq.type === 'fill'){
    const ok = !!a.autoCorrect;
    return `<div class="card ${ok?'correctReview':'wrongReview'}"><span class="qType">Fill-in</span>${ok?'<span class="correctTag">Auto correct</span>':'<span class="wrongTag">Check needed</span>'}<h3>Question ${i+1} (${qq.marks} marks)</h3><div>${qRender(qq)}</div><div class="answerPair"><div><b>Student answer</b><br>${ansRender(qq,a)}</div><div><b>Accepted answer</b><br>${fmt(qq.acceptedText||'')} ${mRender(qq.acceptedMath||'')}</div></div><label class="label">Awarded mark</label><input id="mark_${qq.id}" class="input" type="number" min="0" max="${qq.marks}" value="${a.teacherMark??0}" style="max-width:120px"><label class="label">Feedback</label><textarea id="fb_${qq.id}" class="input" style="min-height:70px">${esc(a.feedback||'')}</textarea></div>`;
  }
  const markArea = (a?.file && typeof markedToolsHTML==='function') ? markedToolsHTML(qq.id,sub.id,a.file) : '';
  setTimeout(()=>{ if(typeof initMarkCanvas==='function') initMarkCanvas(qq.id,sub.id); },150);
  return `<div class="card"><span class="qType">${qTypeName(qq.type)}</span><h3>Question ${i+1} (${qq.marks} marks)</h3><div>${qRender(qq)}</div><div class="notice"><b>Student answer:</b><br>${ansRender(qq,a)}</div>${markArea}<label class="label">ChatGPT marking prompt</label><textarea id="prompt_${qq.id}" class="aiPrompt" readonly>${esc(promptText(qq,a))}</textarea><div class="toolbar"><button class="btn ghost" onclick="copyPrompt('prompt_${qq.id}')">Copy Prompt</button><button class="btn light" onclick="pasteFeedback('${qq.id}')">Paste AI Feedback</button></div><label class="label">Awarded mark</label><input id="mark_${qq.id}" class="input" type="number" min="0" max="${qq.marks}" value="${a.teacherMark??0}" style="max-width:120px"><label class="label">Feedback</label><textarea id="fb_${qq.id}" class="input" style="min-height:70px">${esc(a.feedback||'')}</textarea></div>`;
}
saveMarks = function(subid){
  const sub = state.submissions.find(s=>s.id===subid);
  const q = state.quizzes.find(x=>x.id===sub.quizId);
  let score = 0;
  const comp = $('reviewComponent')?.value || q.componentId || 'assignment';
  q.componentId = comp;
  sub.componentId = comp;
  q.questions.forEach(qq => {
    const a = sub.answers[qq.id] ||= {};
    if(qq.type === 'mcq'){
      a.isCorrect = +a.choice === +qq.answer;
      a.teacherMark = a.isCorrect ? (+qq.marks || 1) : 0;
      a.feedback = a.isCorrect ? 'Correct answer.' : 'Wrong answer.';
    }else{
      const input = $('mark_' + qq.id);
      const fb = $('fb_' + qq.id);
      const mark = input ? (+input.value || 0) : (+a.teacherMark || 0);
      a.teacherMark = Math.max(0, Math.min(+qq.marks || 0, mark));
      a.feedback = fb ? fb.value : (a.feedback || '');
    }
    score += +a.teacherMark || 0;
  });
  sub.score = score;
  sub.pending = q.questions.some(qq => ['theory','upload'].includes(qq.type) && !(sub.answers[qq.id]?.feedback || sub.answers[qq.id]?.teacherMark));
  sub.teacherMarked = !sub.pending;
  save();
  toast('Marks saved. Students will see results only after you publish them.');
  review();
}
</script>
