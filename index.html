      <div class="toolbar"><button class="btn light" onclick="viewStudentPicture('${s.id}')">View Picture Clearly</button></div></div>
    </div>
    <div class="cards"><div class="card stat"><span>Available Assignments / Quizzes</span><b>${availableQuizzes().length}</b></div><div class="card stat"><span>Submitted Work</span><b>${state.submissions.filter(x=>x.studentId===s.id).length}</b></div><div class="card stat"><span>Report Card</span><b>${isReportPublished(s.id) ? 'Open' : 'Locked'}</b></div></div>
    <div class="studentProfileBox">
      <h3>My Phone Number</h3><p>Type or update your phone number here. The teacher will see it in admin mode.</p>
      <div class="phoneUpdateGrid"><input id="selfPhone" class="input" value="${esc(s.phone || '')}" placeholder="Enter phone number"><button class="btn green" onclick="saveStudentPhoneSelf()">Save Phone</button></div>
    </div>
    <div class="card" style="margin-top:12px"><h3>My Picture</h3><p>${canPhoto ? 'You can upload, change, take, view, or delete your own profile picture.' : 'Picture upload is currently disabled by the teacher.'}</p>
      ${canPhoto ? `<div class="studentPhotoControls">
        <label class="btn light">Upload / Change<input type="file" accept="image/*" hidden onchange="uploadStudentPhoto('${s.id}',this.files[0]);setTimeout(()=>studentHome(),300)"></label>
        <button class="btn gold" onclick="openCameraCapture('${s.id}')">Take Picture</button>
        <button class="btn light" onclick="viewStudentPicture('${s.id}')">View Picture</button>
        <button class="btn red" onclick="studentDeleteOwnPhoto()">Delete Picture</button>
      </div>` : `<button class="btn light" onclick="viewStudentPicture('${s.id}')">View Picture</button>`}
    </div>
    <div class="examScoreCard"><h3>My Examination Score</h3>
      ${examPublished ? `<div class="examScoreGrid"><div class="examScoreItem"><span>Exam Raw Score</span><b>${calc.examRaw}/100</b></div><div class="examScoreItem"><span>Exam Contribution</span><b>${calc.exam70}/70</b></div><div class="examScoreItem"><span>Final Grade</span><b>${calc.grade}</b></div></div>` : `<div class="notice">Your examination score has not been published yet.</div>`}
    </div>
    <div class="toolbar" style="margin-top:12px"><button class="btn green" onclick="setRoute('studentQuizzes')">Open Assignments / Quizzes</button><button class="btn light" onclick="setRoute('studentResults')">View Scores / Report</button></div>
  </div>`;
}
function adminDirectoryCard(s){
  const calc = typeof calculateReportScore==="function" ? calculateReportScore(s.id) : {};
  return `<div class="adminStudentDirectoryCard" onclick="adminShowStudentProfileAll('${s.id}')">
    <div class="adminStudentDirectoryHead">${clickableStudentPhoto(s.id)}<div><h3>${esc(s.name)}</h3><small>${esc(s.phone || "No phone number")}<br>${esc(s.code || "")} • ${esc(s.className || "")}</small><small class="photoOpenHint">Click photo to open largely</small></div></div>
    <div class="adminDetailGrid"><div class="adminDetailCell"><span>Subject</span><b>${esc(subjectForClass(s.className)||"")}</b></div><div class="adminDetailCell"><span>Class Raw</span><b>${calc.classRaw ?? "-"} /100</b></div><div class="adminDetailCell"><span>Exam</span><b>${calc.examRaw ?? "-"} /100</b></div><div class="adminDetailCell"><span>Final</span><b>${calc.finalScore ?? "-"}%</b></div></div>
    <div class="fixedActionGrid"><button class="btn light" onclick="event.stopPropagation();viewStudentPicture('${s.id}')">View Picture</button><button class="btn navy" onclick="event.stopPropagation();adminAssignMarks && adminAssignMarks('${s.id}')">CA Marks</button><button class="btn gold" onclick="event.stopPropagation();adminShowStudentProfileAll('${s.id}')">Full Profile</button></div>
  </div>`;
}
function students(){
  const subj = document.getElementById("stSubj")?.value || "ALL";
  const cls = document.getElementById("stClass")?.value || "ALL";
  const q = (document.getElementById("stSearch")?.value || "").toLowerCase();
  const list = (state.students || []).filter(s => (subj==="ALL" || subjectForClass(s.className)===subj) && (cls==="ALL" || s.className===cls) && (!q || String(s.name||"").toLowerCase().includes(q) || String(s.code||"").toLowerCase().includes(q) || String(s.phone||"").toLowerCase().includes(q)));
  $("view").innerHTML = `<div class="allStudentsPanel">
      <h2>All Students Directory</h2>
      <p>All students are listed below with their photo, name, telephone number, class, and assessment summary. Click any picture to open it largely, or click a card to view the full profile.</p>
      <div class="grid four">
        <select id="stSubj" class="select" onchange="students()"><option value="ALL">All Subjects</option>${subjectOptions(subj==="ALL"?"Mathematics":subj)}</select>
        <select id="stClass" class="select" onchange="students()"><option value="ALL">All Classes</option>${classOptions(cls==="ALL"?(state.classes[0]||""):cls)}</select>
        <input id="stSearch" class="input" value="${esc(q)}" oninput="students()" placeholder="Filter by name, phone, or code">
        <button class="btn gold" onclick="openClassPrintModal && openClassPrintModal()">Print Class List</button>
      </div>
      <div id="adminSelectedStudentProfile"></div>
      <div class="adminStudentDirectory">${list.map(adminDirectoryCard).join("") || `<div class="empty">No students found.</div>`}</div>
    </div>
    <div class="studentWorkspace">
      <section>
        <div class="card"><h3>Create Class</h3><div class="grid"><input id="newClass" class="input" placeholder="New class name"><select id="newClassSubject" class="select">${subjectOptions("Mathematics")}</select><button class="btn green full" onclick="addClass()">Add Class</button></div></div>
        <div class="card"><h3>Add One Student</h3><div class="grid"><input id="newStudentName" class="input" placeholder="Student full name"><select id="newStudentClass" class="select">${classOptions(state.classes[0]||"")}</select><input id="newStudentPhone" class="input" placeholder="Phone optional"><button class="btn green full" onclick="addStudent()">Add Student</button></div></div>
        <div class="card"><h3>Bulk Import</h3><p>Paste names one per line or separated by commas.</p><select id="bulkClass" class="select">${classOptions(state.classes[0]||"")}</select><textarea id="bulkNames" placeholder="Paste names here"></textarea><button class="btn gold full" onclick="bulkImport()">Import Names into Selected Class</button></div>
      </section>
      <section><div class="card"><h3>Quick Help</h3><p>Use the directory above to see every student clearly. Use the filter box to narrow the list quickly.</p></div></section>
    </div>`;
}
function adminShowStudentProfileAll(studentId){
  const s = student(studentId); if(!s) return;
  const calc = typeof calculateReportScore==="function" ? calculateReportScore(s.id) : {};
  const box = document.getElementById("adminSelectedStudentProfile") || document.getElementById("adminSmartProfile");
  if(!box) return;
  box.innerHTML = `<div class="adminProfilePanel">
    <div class="adminProfileHead">${clickableStudentPhoto(s.id)}<div><h2 style="margin:0;color:#071f3d">${esc(s.name)}</h2><p style="margin:4px 0 8px;color:#667085">${esc(s.phone || "No phone number")}<br>${esc(s.code||"")} • ${esc(s.className||"")} • ${esc(subjectForClass(s.className)||"")}</p><div class="toolbar"><button class="btn light" onclick="viewStudentPicture('${s.id}')">View Profile Picture</button><button class="btn navy" onclick="adminAssignMarks && adminAssignMarks('${s.id}')">Assign / Edit CA Marks</button></div></div></div>
    <div class="profileInfoGrid"><div class="profileInfo"><span>Telephone</span><b>${esc(s.phone || "No phone number")}</b></div><div class="profileInfo"><span>Class Raw</span><b>${calc.classRaw ?? "-"} /100</b></div><div class="profileInfo"><span>30% Class</span><b>${calc.class30 ?? "-"}</b></div><div class="profileInfo"><span>Exam Raw</span><b>${calc.examRaw ?? "-"} /100</b></div><div class="profileInfo"><span>Exam 70%</span><b>${calc.exam70 ?? "-"}</b></div><div class="profileInfo"><span>Final Score</span><b>${calc.finalScore ?? "-"}%</b></div><div class="profileInfo"><span>Grade</span><b>${calc.grade ?? "-"}</b></div><div class="profileInfo"><span>Remark</span><b>${calc.remark ?? "-"}</b></div></div>
    <div class="phoneUpdateGrid"><input id="adminPhoneEditFixed" class="input" value="${esc(s.phone || '')}" placeholder="Edit phone number"><button class="btn green" onclick="adminSavePhoneFixed ? adminSavePhoneFixed('${s.id}') : editStudent('${s.id}','phone',document.getElementById('adminPhoneEditFixed').value)">Save Phone</button></div>
  </div>`;
  box.scrollIntoView({behavior:"smooth",block:"start"});
}
function sideOpenStudent(id){role = "admin"; route = "students"; renderShell(); setTimeout(()=>{adminShowStudentProfileAll(id);},120);}


/* ===== COMMUNICATION ADD-ON ONLY: SAFE WRAPPERS, ORIGINAL INTERFACE KEPT ===== */
(function(){
  function comm2Ensure(){
    state.messages = Array.isArray(state.messages) ? state.messages : [];
    state.announcements = Array.isArray(state.announcements) ? state.announcements : [];
    state.classMessages = Array.isArray(state.classMessages) ? state.classMessages : [];
  }
  window.comm2Ensure = comm2Ensure;

  window.comm2Time = function(){
    try{return new Date().toLocaleString();}catch(e){return typeof now==="function" ? now() : "";}
  };
  window.comm2Uid = function(prefix){
    return typeof uid==="function" ? uid(prefix) : (prefix + "_" + Date.now() + "_" + Math.random().toString(16).slice(2));
  };
  window.comm2Initials = function(name){
    return String(name||"ST").trim().split(/\s+/).map(x=>x[0]||"").join("").slice(0,2).toUpperCase() || "ST";
  };
  window.comm2Avatar = function(s){
    if(!s) return `<div class="avatar">ST</div>`;
    return s.photo ? `<img src="${s.photo}" alt="">` : `<div class="avatar">${esc(comm2Initials(s.name))}</div>`;
  };
  window.comm2ActiveAnnouncements = function(){
    comm2Ensure();
    return [...state.announcements].filter(a=>a.active !== false).sort((a,b)=>String(b.createdAt||"").localeCompare(String(a.createdAt||"")));
  };
  window.comm2AnnouncementHTML = function(limit=5){
    const list = comm2ActiveAnnouncements().slice(0,limit);
    return `<div class="comm2Banner" id="comm2AnnouncementTop">
      <h2>📢 Announcements</h2>
      ${list.length ? `<div class="comm2AnnGrid">${list.map(a=>`<div class="comm2AnnCard"><b>${esc(a.title || "Announcement")}</b><p>${esc(a.body || "")}</p><small>${esc(a.createdAt || "")}</small></div>`).join("")}</div>` : `<p>No announcement has been posted yet.</p>`}
    </div>`;
  };
  window.comm2SideHTML = function(){
    const anns = comm2ActiveAnnouncements().slice(0,3);
    const annHtml = anns.length ? anns.map(a=>`<div class="comm2SideAnn"><b>${esc(a.title||"Announcement")}</b><small>${esc((a.body||"").slice(0,70))}${(a.body||"").length>70?"...":""}</small></div>`).join("") : `<div class="comm2SideAnn"><b>No announcement yet</b><small>Check again later.</small></div>`;
    const chatBtn = role==="student" && currentStudentId ? `<button onclick="comm2OpenChat('${currentStudentId}')">Open Chat</button>` : "";
    return `<div id="comm2SideBox" class="comm2SideBox"><h3>Announcements</h3>${annHtml}${chatBtn}</div>`;
  };
  window.comm2InjectSide = function(){
    const side=document.querySelector(".side");
    if(!side) return;
    const old=document.getElementById("comm2SideBox");
    if(old) old.remove();
    side.insertAdjacentHTML("beforeend", comm2SideHTML());
  };
  window.comm2UnreadAdmin = function(studentId){
    comm2Ensure();
    return state.messages.filter(m=>m.studentId===studentId && m.from==="student" && !m.readByAdmin).length;
  };
  window.comm2UnreadStudent = function(studentId){
    comm2Ensure();
    return state.messages.filter(m=>m.studentId===studentId && m.from==="admin" && !m.readByStudent).length;
  };
  window.comm2ClassUnreadStudent = function(studentId){
    comm2Ensure();
    const s = student(studentId);
    if(!s) return 0;
    return state.classMessages.filter(m=>(m.className==="ALL" || m.className===s.className) && !(m.readByStudents||[]).includes(studentId)).length;
  };
  window.comm2MessagesForStudent = function(studentId){
    comm2Ensure();
    const s = student(studentId);
    const direct = state.messages.filter(m=>m.studentId===studentId).map(m=>({...m, kind:"direct"}));
    const classMsgs = (state.classMessages||[])
      .filter(m=>s && (m.className==="ALL" || m.className===s.className))
      .map(m=>({...m, kind:"class", from:"admin"}));
    return [...direct, ...classMsgs].sort((a,b)=>String(a.createdAt||"").localeCompare(String(b.createdAt||"")));
  };
  window.comm2ChatBody = function(studentId){
    const msgs = comm2MessagesForStudent(studentId);
    if(!msgs.length) return `<div class="empty">No message yet. Start the conversation.</div>`;
    return msgs.map(m=>{
      const cls = m.kind==="class" ? "broadcast" : (m.from==="admin" ? "admin" : "student");
      const sender = m.kind==="class" ? "Class Message from Teacher" : (m.from==="admin" ? "Sir Isaac Boahen" : "Student");
      return `<div class="comm2Bubble ${cls}">${esc(m.text||"")}<small>${sender} • ${esc(m.createdAt||"")}</small></div>`;
    }).join("");
  };
  window.comm2OpenChat = function(studentId){
    comm2Ensure();
    const s = student(studentId);
    if(!s) return alert("Student not found.");
    if(role === "admin"){
      state.messages.forEach(m=>{ if(m.studentId===studentId && m.from==="student") m.readByAdmin=true; });
    }else{
      state.messages.forEach(m=>{ if(m.studentId===studentId && m.from==="admin") m.readByStudent=true; });
      state.classMessages.forEach(m=>{
        if(m.className==="ALL" || m.className===s.className){
          m.readByStudents = Array.isArray(m.readByStudents) ? m.readByStudents : [];
          if(!m.readByStudents.includes(studentId)) m.readByStudents.push(studentId);
        }
      });
    }
    save();
    const old=document.getElementById("comm2ModalOverlay");
    if(old) old.remove();
    document.body.insertAdjacentHTML("beforeend", `<div id="comm2ModalOverlay" class="comm2ModalOverlay">
      <div class="comm2Modal">
        <div class="comm2Header">
          <div><h2>${role==="admin" ? `Chat with ${esc(s.name)}` : "Chat with Sir Isaac Boahen"}</h2><p>${role==="admin" ? esc((s.phone||"No phone") + " • " + (s.className||"")) : "0248481762 • Akuse Methodist SHTS"}</p></div>
          <button onclick="comm2CloseChat()">Close</button>
        </div>
        <div id="comm2Messages" class="comm2Messages">${comm2ChatBody(studentId)}</div>
        <div class="comm2InputArea">
          <textarea id="comm2Text" placeholder="Type your message here..." onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();comm2SendMessage('${studentId}')}"></textarea>
          <button onclick="comm2SendMessage('${studentId}')">Send</button>
        </div>
      </div>
    </div>`);
    setTimeout(()=>{const box=document.getElementById("comm2Messages"); if(box) box.scrollTop=box.scrollHeight; const t=document.getElementById("comm2Text"); if(t) t.focus();},80);
  };
  window.comm2SendMessage = function(studentId){
    comm2Ensure();
    const text=(document.getElementById("comm2Text")?.value||"").trim();
    if(!text) return;
    state.messages.push({
      id: comm2Uid("msg"),
      studentId,
      from: role==="admin" ? "admin" : "student",
      text,
      createdAt: comm2Time(),
      readByAdmin: role==="admin",
      readByStudent: role!=="admin"
    });
    save();
    const input=document.getElementById("comm2Text");
    if(input) input.value="";
    const box=document.getElementById("comm2Messages");
    if(box){box.innerHTML=comm2ChatBody(studentId); setTimeout(()=>box.scrollTop=box.scrollHeight,30);}
  };
  window.comm2CloseChat = function(){
    const old=document.getElementById("comm2ModalOverlay");
    if(old) old.remove();
    if(typeof renderShell==="function") setTimeout(comm2InjectSide,80);
  };
  window.comm2AdminPanels = function(){
    const anns = comm2ActiveAnnouncements().slice(0,8);
    return `<div id="comm2AdminPanels">
      <div class="comm2Panel">
        <h2>General Announcement</h2>
        <p>Post announcements for students. Students will see them on the left panel, app opening page, and inside their portal.</p>
        <div class="comm2Grid">
          <input id="comm2AnnTitle" class="input" placeholder="Announcement title">
          <input id="comm2AnnBody" class="input" placeholder="Announcement message">
        </div>
        <div class="toolbar" style="margin-top:10px">
          <button class="btn green" onclick="comm2PostAnnouncement()">Post Announcement</button>
          <button class="btn red" onclick="comm2ClearAnnouncements()">Clear Announcements</button>
        </div>
        <div class="comm2AnnGrid">${anns.map(a=>`<div class="comm2AnnCard"><b>${esc(a.title||"Announcement")}</b><p>${esc(a.body||"")}</p><small>${esc(a.createdAt||"")}</small></div>`).join("") || `<div class="empty">No announcement yet.</div>`}</div>
      </div>
      <div class="comm2Panel">
        <h2>Chat with Entire Class</h2>
        <p>Send one message to all students or to a selected class. It will appear inside their chat window.</p>
        <div class="comm2Grid">
          <select id="comm2ClassSelect" class="select"><option value="ALL">All Classes</option>${(state.classes||[]).map(c=>`<option value="${esc(c)}">${esc(c)} — ${esc(subjectForClass(c)||"")}</option>`).join("")}</select>
          <input id="comm2ClassMsg" class="input" placeholder="Type class message here">
        </div>
        <div class="toolbar" style="margin-top:10px"><button class="btn green" onclick="comm2SendClassMessage()">Send to Class</button></div>
      </div>
      <div class="comm2Panel">
        <h2>Chat with a Particular Student</h2>
        <p>Search and open a direct chat with any student.</p>
        <input id="comm2StudentSearch" class="input" placeholder="Search student to chat..." oninput="comm2StudentSearch()">
        <div id="comm2StudentList" class="comm2StudentChatList">${comm2StudentListHTML(state.students||[])}</div>
      </div>
    </div>`;
  };
  window.comm2PostAnnouncement = function(){
    comm2Ensure();
    const title=(document.getElementById("comm2AnnTitle")?.value||"").trim() || "General Announcement";
    const body=(document.getElementById("comm2AnnBody")?.value||"").trim();
    if(!body) return alert("Type the announcement message.");
    state.announcements.push({id:comm2Uid("ann"), title, body, createdAt:comm2Time(), active:true});
    save();
    alert("Announcement posted.");
    if(typeof dashboard==="function") dashboard();
    setTimeout(comm2InjectSide,80);
  };
  window.comm2ClearAnnouncements = function(){
    comm2Ensure();
    if(!confirm("Clear all announcements?")) return;
    state.announcements=[];
    save();
    if(typeof dashboard==="function") dashboard();
    setTimeout(comm2InjectSide,80);
  };
  window.comm2SendClassMessage = function(){
    comm2Ensure();
    const className=document.getElementById("comm2ClassSelect")?.value || "ALL";
    const text=(document.getElementById("comm2ClassMsg")?.value||"").trim();
    if(!text) return alert("Type a message first.");
    state.classMessages.push({id:comm2Uid("clsmsg"), className, text, createdAt:comm2Time(), readByStudents:[]});
    save();
    alert(className==="ALL" ? "Message sent to all students." : "Message sent to " + className + ".");
    if(typeof dashboard==="function") dashboard();
  };
  window.comm2StudentListHTML = function(list){
    return list.slice(0,120).map(s=>{
      const unread = comm2UnreadAdmin(s.id);
      return `<button class="comm2StudentBtn" onclick="comm2OpenChat('${s.id}')">
        ${comm2Avatar(s)}
        <span><b>${esc(s.name)}</b><small>${esc(s.className||"")} • ${esc(s.phone||"No phone")}</small></span>
        ${unread?`<span class="comm2Badge">${unread}</span>`:`<span></span>`}
      </button>`;
    }).join("") || `<div class="empty">No student found.</div>`;
  };
  window.comm2StudentSearch = function(){
    const q=(document.getElementById("comm2StudentSearch")?.value||"").toLowerCase().trim();
    const list=(state.students||[]).filter(s=>!q || String(s.name||"").toLowerCase().includes(q) || String(s.className||"").toLowerCase().includes(q) || String(s.phone||"").toLowerCase().includes(q));
    const box=document.getElementById("comm2StudentList");
    if(box) box.innerHTML=comm2StudentListHTML(list);
  };
  window.comm2InjectDashboard = function(){
    const view=document.getElementById("view");
    if(!view || role!=="admin" || route!=="dashboard") return;
    if(document.getElementById("comm2AdminPanels")) return;
    view.insertAdjacentHTML("afterbegin", comm2AdminPanels());
  };
  window.comm2InjectStudentLogin = function(){
    const view=document.getElementById("view");
    if(!view || role!=="guest" || route!=="studentLogin") return;
    if(document.getElementById("comm2AnnouncementTop")) return;
    view.insertAdjacentHTML("afterbegin", comm2AnnouncementHTML(6));
  };
  window.comm2InjectStudentHome = function(){
    const view=document.getElementById("view");
    const s = student(currentStudentId);
    if(!view || role!=="student" || !s) return;
    if(document.getElementById("comm2StudentMsgCentre")) return;
    const unread = comm2UnreadStudent(s.id) + comm2ClassUnreadStudent(s.id);
    view.insertAdjacentHTML("afterbegin", `${comm2AnnouncementHTML(6)}<div class="comm2Panel" id="comm2StudentMsgCentre"><h2>Message Centre</h2><p>Chat directly with Sir Isaac Boahen and read class messages here.</p><button class="btn green" onclick="comm2OpenChat('${s.id}')">Open Chat ${unread?`(${unread} new)`:''}</button></div>`);
  };
  window.comm2AppendProfileChat = function(studentId){
    const profile=document.getElementById("adminSelectedStudentProfile") || document.getElementById("adminSmartProfile");
    if(!profile || profile.querySelector(".comm2InlineBtn")) return;
    profile.insertAdjacentHTML("beforeend", `<div class="toolbar" style="margin-top:10px"><button class="comm2InlineBtn" onclick="comm2OpenChat('${studentId}')">Chat with this student</button></div>`);
  };

  const oldRenderShell = window.renderShell;
  if(typeof oldRenderShell==="function"){
    window.renderShell = function(){
      const result = oldRenderShell.apply(this, arguments);
      setTimeout(comm2InjectSide, 50);
      return result;
    };
  }

  const oldDashboard = window.dashboard;
  if(typeof oldDashboard==="function"){
    window.dashboard = function(){
      const result = oldDashboard.apply(this, arguments);
      comm2InjectDashboard();
      return result;
    };
  }

  const oldStudentLogin = window.studentLogin;
  if(typeof oldStudentLogin==="function"){
    window.studentLogin = function(){
      const result = oldStudentLogin.apply(this, arguments);
      comm2InjectStudentLogin();
      return result;
    };
  }

  const oldStudentHome = window.studentHome;
  if(typeof oldStudentHome==="function"){
    window.studentHome = function(){
      const result = oldStudentHome.apply(this, arguments);
      comm2InjectStudentHome();
      return result;
    };
  }

  const oldAdminProfile = window.adminShowStudentProfileAll || window.adminShowStudentProfileFixed;
  if(typeof oldAdminProfile==="function"){
    window.adminShowStudentProfileAll = function(studentId){
      const result = oldAdminProfile.apply(this, arguments);
      comm2AppendProfileChat(studentId);
      return result;
    };
  }

  const oldAdminDirectoryCard = window.adminDirectoryCard;
  if(typeof oldAdminDirectoryCard==="function"){
    window.adminDirectoryCard = function(s){
      let base = oldAdminDirectoryCard.apply(this, arguments);
      return base.replace(`</div>`, `<button class="comm2InlineBtn" onclick="event.stopPropagation();comm2OpenChat('${s.id}')">Chat</button></div>`);
    };
  }
})();

loadLocal();
if(window.importOldPortalDataIfNeeded){ importOldPortalDataIfNeeded(); }
initSupabase().then(render);
render();
</script>
