<script>
/* LIVE VERSION ADDITIONS: passwords, phone numbers, password ON/OFF, quick sharing, and Supabase sync */
(function(){
  function safeId(x){ return String(x||'').replace(/[^a-zA-Z0-9_-]/g,'_'); }
  function ensureStudentAccessFields(){
    if(!state || !Array.isArray(state.students)) return;
    if(state.requireStudentPassword === undefined) state.requireStudentPassword = true;
    state.students.forEach((s, i) => {
      if(!s.password) s.password = s.code || ('STU' + String(i+1).padStart(3,'0'));
      if(s.phone === undefined) s.phone = '';
    });
  }
  ensureStudentAccessFields();

  function cleanPhone(phone){
    let p = String(phone||'').replace(/[^\d+]/g,'');
    if(p.startsWith('+')) p = p.slice(1);
    if(p.startsWith('0') && p.length === 10) p = '233' + p.slice(1);
    return p;
  }
  function passwordModeText(){
    return state.requireStudentPassword ? 'Password Required' : 'Password Off';
  }
  function studentPasswordMessage(s){
    return "Hello " + s.name + ", your Isaac's Assessment Portal login password is: " + s.password + ". Use this password anytime you open your own assessment portal.";
  }

  window.generateStudentPassword = function(id){
    ensureStudentAccessFields();
    const s = student(id);
    if(!s) return;
    const part = Math.random().toString(36).slice(2,6).toUpperCase();
    s.password = 'AM' + part;
    save();
    if(typeof students === 'function') students();
    toast('Password generated for ' + s.name);
  };
  window.updateStudentPassword = function(id, value){
    const s = student(id);
    if(!s) return;
    s.password = String(value||'').trim();
    save();
  };
  window.updateStudentPhone = function(id, value){
    const s = student(id);
    if(!s) return;
    s.phone = String(value||'').trim();
    save();
  };
  window.copyStudentPassword = async function(id){
    const s = student(id);
    if(!s) return;
    const msg = studentPasswordMessage(s);
    try{
      await navigator.clipboard.writeText(msg);
      toast('Password message copied.');
    }catch(e){
      prompt('Copy this message:', msg);
    }
  };
  window.shareStudentPassword = function(id){
    const s = student(id);
    if(!s) return;
    const msg = studentPasswordMessage(s);
    const phone = cleanPhone(s.phone);
    if(navigator.share){
      navigator.share({title:'Assessment Portal Password', text:msg}).catch(()=>{});
      return;
    }
    if(phone){
      window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');
    }else{
      copyStudentPassword(id);
      alert('No telephone number saved for this student. The message has been copied instead.');
    }
  };

  window.goToSelectedStudentPortal = function(){
    ensureStudentAccessFields();
    const sid = window.loginSelectedStudentId;
    const s = sid ? student(sid) : null;
    if(!s) return alert('Please select your name from the list.');

    if(state.requireStudentPassword){
      const input = document.getElementById('studentPassword_' + safeId(sid));
      const entered = (input ? input.value : prompt('Enter your personal password:')) || '';
      if(String(entered).trim() !== String(s.password||'').trim()){
        return alert('Wrong password. Please check the password your teacher gave you.');
      }
    }

    currentStudentId = sid;
    role = 'student';
    openApp('studentHome');
  };
  window.selectLoginStudentAndShowButton = function(id){
    window.loginSelectedStudentId = id;
    if(typeof renderStudentPickerStableFixed === 'function') renderStudentPickerStableFixed();
    setTimeout(()=>{
      const input = document.getElementById('studentPassword_' + safeId(id));
      if(input) input.focus();
    },60);
  };
  window.loginStudentNoPass = window.goToSelectedStudentPortal;
  window.loginStudent = window.goToSelectedStudentPortal;

  window.renderStudentPickerStableFixed = function(){
    ensureStudentAccessFields();
    let box = $('studentPickerArea'); 
    if(!box) return;

    let list = (typeof pickerListFixed === 'function') ? pickerListFixed() : state.students;
    let instruction = state.requireStudentPassword
      ? 'Click your name, type your personal password, then open your portal.'
      : 'Password is OFF. Click your name and open your portal directly. You can also double-click your name.';

    box.innerHTML = (typeof subjectPortalCardsFixed==='function'?subjectPortalCardsFixed():'') + 
      (typeof classTabsFixed==='function'?classTabsFixed():'') + 
      `<div class="loginSearchBox">
        <input id="studentQuickSearch" class="input" value="${esc(window.loginSearchText||'')}" oninput="setLoginSearch(this.value)" placeholder="Quick search student name, code, or class">
        <div class="quickSearchHint">${instruction}</div>
      </div>
      <div class="studentPickPanel">
        ${list.map(s=>{
          const passwordArea = state.requireStudentPassword
            ? `<span class="studentPasswordInline" onclick="event.stopPropagation()"><input id="studentPassword_${safeId(s.id)}" class="input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter'){goToSelectedStudentPortal()}"><button class="btn green" onclick="event.stopPropagation();goToSelectedStudentPortal()">Go to Student Assessment Portal</button></span>`
            : `<span class="studentPasswordInline" onclick="event.stopPropagation()"><button class="btn green" onclick="event.stopPropagation();goToSelectedStudentPortal()">Go to Student Assessment Portal</button></span>`;
          return `<button type="button" class="studentPickBtn loginRow ${window.loginSelectedStudentId===s.id?'selected':''}" onclick="selectLoginStudentAndShowButton('${s.id}')" ondblclick="window.loginSelectedStudentId='${s.id}';goToSelectedStudentPortal()">${typeof fastPhotoHTML==='function'?fastPhotoHTML(s):''}<span class="stuMeta"><b>${esc(s.name)}</b><small>${esc(s.code)} • ${esc(s.className)} • ${esc(subjectForClass(s.className))}${s.phone?' • '+esc(s.phone):''}</small></span>${passwordArea}</button>`;
        }).join('') || '<div class="empty">No student found.</div>'}
      </div>`;

    const input = $('studentQuickSearch');
    if(input){
      const len = input.value.length;
      try{ input.focus(); input.setSelectionRange(len,len); }catch(e){}
    }
  };

  window.rebuildStudentLoginNoPass = function(){
    ensureStudentAccessFields();
    let box = $('studentLogin'); 
    if(!box) return;
    const modeNote = state.requireStudentPassword
      ? 'Each student must use the personal password assigned by the teacher.'
      : 'Password is currently OFF. Students can enter after selecting their names.';
    box.innerHTML = `<label class="label">Choose your subject/class, then click your name</label><div id="studentPickerArea"></div><div class="notice" style="margin-top:10px">${modeNote}</div>`;
    renderStudentPickerStableFixed();
  };

  window.setGlobalStudentPasswordMode = function(value){
    state.requireStudentPassword = !!value;
    save();
    toast(state.requireStudentPassword ? 'Student passwords are now ON.' : 'Student passwords are now OFF.');
    if(typeof settings === 'function') settings();
  };

  window.students = function(){
    ensureStudentAccessFields();
    let cl = $('stuClass')?.value || 'ALL';
    let subj = $('stuSubject')?.value || 'ALL';
    let q = ($('stuSearch')?.value || '').toLowerCase();
    let list = state.students.filter(s=>{
      let okClass = cl==='ALL' || s.className===cl;
      let okSubj = subj==='ALL' || subjectForClass(s.className)===subj;
      let okSearch = !q || s.name.toLowerCase().includes(q) || s.code.toLowerCase().includes(q) || String(s.phone||'').includes(q);
      return okClass && okSubj && okSearch;
    });
    const subjectOptions = state.subjects.map(s=>`<option value="${esc(s.name)}" ${subj===s.name?'selected':''}>${esc(s.name)}</option>`).join('');
    $('view').innerHTML = `<div class="card"><div class="grid four"><select id="stuSubject" class="select" onchange="students()"><option value="ALL" ${subj==='ALL'?'selected':''}>All Subjects</option>${subjectOptions}</select><select id="stuClass" class="select" onchange="students()"><option value="ALL" ${cl==='ALL'?'selected':''}>All Classes</option>${classOpts(cl)}</select><input id="stuSearch" class="input" oninput="students()" value="${esc(q)}" placeholder="Search name, code, or phone"><button class="btn ghost" onclick="downloadStudentsWithPhones()">Export CSV</button></div><p class="notice" style="margin-top:12px">Set a password for each student. Add telephone numbers, then use Quick Share to send the password message.</p></div><div class="card"><div class="kicker">Students, telephone numbers, and passwords</div><div class="tableWrap"><table><thead><tr><th>Photo</th><th>Name</th><th>Code</th><th>Class</th><th>Subject</th><th>Telephone</th><th>Password</th><th>Quick Share</th><th>Picture</th></tr></thead><tbody>${list.map(s=>`<tr class="studentClickableRow" ondblclick="openStudentPortalFromAdmin && openStudentPortalFromAdmin('${s.id}')"><td>${typeof photoHTML==='function'?photoHTML(s):''}</td><td><b>${esc(s.name)}</b></td><td>${esc(s.code)}</td><td>${esc(s.className)}</td><td>${esc(subjectForClass(s.className))}</td><td><input class="input phoneInputSmall" value="${esc(s.phone||'')}" placeholder="024..." onchange="updateStudentPhone('${s.id}',this.value)"></td><td><input class="input passwordInputSmall" value="${esc(s.password||'')}" placeholder="Password" onchange="updateStudentPassword('${s.id}',this.value)"><button class="btn light" style="margin-top:6px" onclick="generateStudentPassword('${s.id}')">Generate</button></td><td><div class="shareButtonGroup"><button class="btn green" onclick="shareStudentPassword('${s.id}')">Share</button><button class="btn ghost" onclick="copyStudentPassword('${s.id}')">Copy</button></div><div class="quickShareMsg">${s.phone?'WhatsApp-ready':'Add phone or copy message'}</div></td><td><div class="photoUploadRow"><button class="btn light" onclick="chooseStudentPhoto('${s.id}','students',false)">Upload</button><button class="btn gold" onclick="chooseStudentPhoto('${s.id}','students',true)">Camera</button></div></td></tr>`).join('')}</tbody></table></div></div>`;
  };
  window.downloadStudentsWithPhones = function(){
    const csv = [['Code','Name','Class','Subject','Telephone','Password'], ...state.students.map(s=>[s.code,s.name,s.className,subjectForClass(s.className),s.phone||'',s.password||''])]
      .map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
    download('students_passwords_and_phones.csv', csv, 'text/csv');
  };

  const previousStudentHomePhone = window.studentHome || studentHome;
  window.studentHome = function(){
    previousStudentHomePhone();
    const s = student(currentStudentId);
    if(!s) return;
    const container = document.querySelector('#view .profileCard > div') || document.querySelector('#view .card');
    if(container && !document.getElementById('studentPhoneSelfBox')){
      container.insertAdjacentHTML('beforeend', `<div id="studentPhoneSelfBox" class="studentPhoneBox"><div class="kicker">My telephone number</div><div class="grid two"><input id="studentSelfPhone" class="input" value="${esc(s.phone||'')}" placeholder="Enter telephone number"><button class="btn green" onclick="saveMyTelephoneNumber()">Save Telephone Number</button></div><p class="quickShareMsg">Your teacher will see this number in admin mode.</p></div>`);
    }
  };
  window.saveMyTelephoneNumber = function(){
    const s = student(currentStudentId);
    if(!s) return;
    s.phone = $('studentSelfPhone')?.value.trim() || '';
    save();
    toast('Telephone number saved.');
  };

  const previousSettingsForPasswordToggle = window.settings || settings;
  window.settings = function(){
    ensureStudentAccessFields();
    if(previousSettingsForPasswordToggle) previousSettingsForPasswordToggle();
    const existing = $('view').innerHTML;
    const toggleHtml = `<div class="card passwordToggleBox">
      <div class="kicker">Student password control</div>
      <p class="notice">Use this to control whether students must enter their personal password before opening their own portal.</p>
      <p><span class="passwordModeBadge ${state.requireStudentPassword?'on':'off'}">${passwordModeText()}</span></p>
      <div class="toolbar">
        <button class="btn green" onclick="setGlobalStudentPasswordMode(true)">Turn Password ON</button>
        <button class="btn gold" onclick="setGlobalStudentPasswordMode(false)">Turn Password OFF for All Students</button>
      </div>
    </div>`;
    $('view').innerHTML = toggleHtml + existing;
  };

  window.updateLiveStatus = function(text, mode){
    let el = document.getElementById('liveStatusBar');
    if(!el){
      el = document.createElement('div');
      el.id = 'liveStatusBar';
      el.className = 'liveStatusBar';
      document.body.appendChild(el);
    }
    el.className = 'liveStatusBar ' + (mode || '');
    el.textContent = text;
  };

  const originalShowLive = show;
  show = function(v){
    window.__currentView = v;
    return originalShowLive(v);
  };

  async function initSupabaseLiveSync(){
    const url = window.AMEST_SUPABASE_URL;
    const key = window.AMEST_SUPABASE_ANON_KEY;
    if(!url || !key || url.includes('PASTE_') || key.includes('PASTE_')){
      updateLiveStatus('Offline mode: add Supabase keys', 'warn');
      return;
    }
    if(!window.supabase){
      updateLiveStatus('Supabase library not loaded', 'bad');
      return;
    }
    const client = window.supabase.createClient(url, key);
    window.amestSupabaseClient = client;
    updateLiveStatus('Connecting live...', 'warn');

    let applyingRemote = false;
    let saveTimer = null;
    async function pushState(){
      if(applyingRemote) return;
      ensureStudentAccessFields();
      const payload = { id: 'main', data: state, updated_at: new Date().toISOString() };
      const { error } = await client.from('app_state').upsert(payload, { onConflict:'id' });
      if(error){
        console.error(error);
        updateLiveStatus('Live sync error', 'bad');
      }else{
        updateLiveStatus('Live', 'ok');
      }
    }
    save = function(){
      ensureStudentAccessFields();
      localStorage.setItem(KEY, JSON.stringify(state));
      clearTimeout(saveTimer);
      saveTimer = setTimeout(pushState, 450);
    };

    const { data, error } = await client.from('app_state').select('data').eq('id','main').maybeSingle();
    if(error){
      console.error(error);
      updateLiveStatus('Live load error', 'bad');
    }else if(data && data.data && Object.keys(data.data).length){
      applyingRemote = true;
      state = data.data;
      ensureStudentAccessFields();
      localStorage.setItem(KEY, JSON.stringify(state));
      applyingRemote = false;
      updateLiveStatus('Live', 'ok');
      if(role) show(window.__currentView || (role==='admin'?'dashboard':'studentHome'));
    }else{
      await pushState();
    }

    client.channel('amest-live-state')
      .on('postgres_changes', { event:'*', schema:'public', table:'app_state', filter:'id=eq.main' }, payload => {
        if(!payload.new || !payload.new.data) return;
        applyingRemote = true;
        state = payload.new.data;
        ensureStudentAccessFields();
        localStorage.setItem(KEY, JSON.stringify(state));
        applyingRemote = false;
        updateLiveStatus('Live updated', 'ok');
        if(role){
          const current = window.__currentView || (role==='admin'?'dashboard':'studentHome');
          if(!['quizBuilder'].includes(current)) show(current);
        }
      })
      .subscribe(status => {
        if(status === 'SUBSCRIBED') updateLiveStatus('Live', 'ok');
      });
  }

  setTimeout(() => {
    ensureStudentAccessFields();
    save();
    initSupabaseLiveSync();
    if(!$('studentLogin')?.classList.contains('hidden')) rebuildStudentLoginNoPass();
  }, 500);
})();
</script>


<script>
/* ADMIN QUIZ PORTAL CONTROL
   Teacher can hide all quizzes from student portals, delete selected quizzes,
   delete all quizzes, and reset a student's submissions.
*/
(function(){
  function allQuizCount(){ return (state.quizzes || []).length; }
  function publishedQuizCount(){ return (state.quizzes || []).filter(q => q.status === 'Published').length; }
  function submissionCount(){ return (state.submissions || []).length; }
  function studentDisplayName(id){
    const s = student(id);
    return s ? (s.name + ' - ' + s.className) : 'Unknown student';
  }
  function safeRefreshAfterQuizAction(){
    save();
    if(typeof show === 'function'){
      if(window.__currentView === 'quizControl') show('quizControl');
      else if(window.__currentView === 'quizBuilder') show('quizBuilder');
      else if(role === 'admin') show('quizControl');
    }
  }

  window.hideAllQuizzesFromStudents = function(){
    if(!state.quizzes || !state.quizzes.length){
      alert('There is no quiz to hide.');
      return;
    }
    if(!confirm('This will remove all quizzes from every student portal, but the quizzes will remain saved in admin mode as Draft. Continue?')) return;
    state.quizzes.forEach(q => q.status = 'Draft');
    save();
    toast('All quizzes have been hidden from student portals.');
    show('quizControl');
  };

  window.publishSelectedQuiz = function(qid){
    const q = (state.quizzes || []).find(x => x.id === qid);
    if(!q) return;
    q.status = 'Published';
    save();
    toast('Quiz published to assigned students.');
    show('quizControl');
  };

  window.hideSelectedQuiz = function(qid){
    const q = (state.quizzes || []).find(x => x.id === qid);
    if(!q) return;
    q.status = 'Draft';
    save();
    toast('Quiz hidden from student portals.');
    show('quizControl');
  };

  window.deleteSelectedQuizEverywhere = function(qid){
    const q = (state.quizzes || []).find(x => x.id === qid);
    if(!q) return;
    if(!confirm('Delete "' + q.title + '" completely? This will also delete all student submissions for this quiz.')) return;
    state.quizzes = (state.quizzes || []).filter(x => x.id !== qid);
    state.submissions = (state.submissions || []).filter(s => s.quizId !== qid);
    save();
    toast('Quiz and its submissions deleted.');
    show('quizControl');
  };

  window.deleteAllQuizzesEverywhere = function(){
    if(!confirm('This will permanently delete ALL quizzes and ALL quiz submissions for every student. Continue?')) return;
    if(!confirm('Final confirmation: Delete all quizzes and submissions now?')) return;
    state.quizzes = [];
    state.submissions = [];
    save();
    toast('All quizzes and submissions have been deleted.');
    show('quizControl');
  };

  window.resetStudentPortalSubmissions = function(){
    const sid = $('resetStudentSelect')?.value;
    if(!sid) return alert('Select a student first.');
    const s = student(sid);
    if(!confirm('Reset quiz submissions for ' + (s ? s.name : 'this student') + '? Published quizzes will still appear, but their previous answers/scores will be removed.')) return;
    state.submissions = (state.submissions || []).filter(x => x.studentId !== sid);
    save();
    toast('Student portal submissions reset.');
    show('quizControl');
  };

  window.resetStudentPortalFull = function(){
    const sid = $('resetStudentSelect')?.value;
    if(!sid) return alert('Select a student first.');
    const s = student(sid);
    if(!confirm('Full reset for ' + (s ? s.name : 'this student') + '? This will remove this student’s submissions and also hide all currently published quizzes from every student portal.')) return;
    state.submissions = (state.submissions || []).filter(x => x.studentId !== sid);
    state.quizzes = (state.quizzes || []).map(q => ({...q, status:'Draft'}));
    save();
    toast('Student submissions reset and all quizzes hidden from portals.');
    show('quizControl');
  };

  /* Stronger delete: wherever the old Delete button appears, also remove submissions. */
  window.deleteQuiz = function(qid){
    const q = (state.quizzes || []).find(x => x.id === qid);
    if(!q) return;
    if(confirm('Delete "' + q.title + '" completely? This also removes all submissions for this quiz.')){
      state.quizzes = (state.quizzes || []).filter(x => x.id !== qid);
      state.submissions = (state.submissions || []).filter(s => s.quizId !== qid);
      save();
      toast('Quiz deleted.');
      if(window.__currentView === 'quizControl') show('quizControl');
      else if(typeof quizBuilder === 'function') quizBuilder();
    }
  };

  window.quizControl = function(){
    const quizzes = state.quizzes || [];
    const subs = state.submissions || [];
    const students = state.students || [];
    const studentOptions = students.map(s => `<option value="${s.id}">${esc(s.name)} - ${esc(s.className)} - ${esc(subjectForClass(s.className))}</option>`).join('');
    $('view').innerHTML = `
      <div class="card">
        <div class="kicker">Quiz portal control</div>
        <h2 style="margin:0;color:var(--navy)">Control what students see in their portals</h2>
        <p class="resetNotice">Use this page to clear old quizzes from student portals, delete unwanted quizzes, or reset a student's quiz submissions. To make students see a quiz again, publish that quiz.</p>
        <div class="quizControlGrid">
          <div class="quizControlCard"><h3>${allQuizCount()}</h3><p>Total quizzes saved in admin mode</p></div>
          <div class="quizControlCard"><h3>${publishedQuizCount()}</h3><p>Quizzes currently visible in student portals</p></div>
          <div class="quizControlCard"><h3>${submissionCount()}</h3><p>Total student submissions saved</p></div>
        </div>
        <div class="toolbar">
          <button class="btn gold" onclick="hideAllQuizzesFromStudents()">Clear All Quizzes from Student Portals</button>
          <button class="btn red" onclick="deleteAllQuizzesEverywhere()">Delete All Quizzes and Submissions</button>
          <button class="btn green" onclick="show('quizBuilder')">Create / Assign New Quiz</button>
        </div>
      </div>

      <div class="card">
        <div class="kicker">Reset one student's portal</div>
        <div class="grid two">
          <select id="resetStudentSelect" class="select">${studentOptions}</select>
          <div class="toolbar" style="margin-top:0">
            <button class="btn light" onclick="resetStudentPortalSubmissions()">Clear This Student's Answers/Scores</button>
            <button class="btn gold" onclick="resetStudentPortalFull()">Reset Student and Hide All Quizzes</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="kicker">Delete or hide individual quizzes</div>
        ${quizzes.length ? `<div class="tableWrap"><table><thead><tr><th>Quiz</th><th>Subject</th><th>Class</th><th>Questions</th><th>Submissions</th><th>Portal Status</th><th>Action</th></tr></thead><tbody>
          ${quizzes.map(q => {
            const qSubs = subs.filter(s => s.quizId === q.id).length;
            const classText = Array.isArray(q.classNames) ? q.classNames.join(', ') : (q.className || 'ALL');
            return `<tr>
              <td><b>${esc(q.title || 'Untitled Quiz')}</b><br><small>${esc(q.createdAt || '')}</small></td>
              <td>${esc(q.subject || '')}</td>
              <td>${esc(classText)}</td>
              <td>${(q.questions || []).length}</td>
              <td>${qSubs}</td>
              <td><span class="quizStatusPill ${q.status === 'Published' ? 'live' : 'hidden'}">${q.status === 'Published' ? 'Visible to students' : 'Hidden / Draft'}</span></td>
              <td>
                ${q.status === 'Published'
                  ? `<button class="btn light" onclick="hideSelectedQuiz('${q.id}')">Hide</button>`
                  : `<button class="btn green" onclick="publishSelectedQuiz('${q.id}')">Publish</button>`}
                <button class="btn red" onclick="deleteSelectedQuizEverywhere('${q.id}')">Delete</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody></table></div>` : '<div class="empty">No quizzes are saved. Student portals are clear.</div>'}
      </div>`;
  };

  /* Add Quiz Control to admin menu without removing existing items. */
  const previousBuildNavQuizControl = window.buildNav || buildNav;
  window.buildNav = function(){
    if(role === 'admin'){
      const items = [
        ['dashboard','Dashboard'],
        ['students','Students'],
        ['quizBuilder','Quiz Builder'],
        ['quizControl','Quiz Control / Reset'],
        ['components','Assessment Components'],
        ['review','Review / Marking'],
        ['reports','Reports'],
        ['settings','Settings'],
        ['backup','Backup']
      ];
      $('nav').innerHTML = items.map(x=>`<button data-v="${x[0]}" onclick="show('${x[0]}')">${x[1]}</button>`).join('') + `<button onclick="logout()">Logout</button>`;
    }else{
      previousBuildNavQuizControl();
    }
  };

  const previousShowQuizControl = window.show || show;
  window.show = function(v){
    window.__currentView = v;
    if(v === 'quizControl'){
      document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.v === v));
      topInfo();
      $('pageTitle').textContent = 'Quiz Control / Reset';
      $('pageSub').textContent = 'Clear old quizzes from student portals, delete quizzes, and reset student submissions.';
      quizControl();
      return;
    }
    previousShowQuizControl(v);
  };

  /* Dashboard shortcut so the teacher sees the clearing option immediately. */
  const previousDashboardQuizControl = window.dashboard || dashboard;
  window.dashboard = function(){
    previousDashboardQuizControl();
    const view = $('view');
    if(view && !document.getElementById('quizControlShortcut')){
      view.insertAdjacentHTML('beforeend', `<div id="quizControlShortcut" class="card">
        <div class="kicker">Clear student portals</div>
        <p class="resetNotice">If old quizzes are showing in student portals, click below to hide all quizzes immediately. You can later publish only the quiz you want students to see.</p>
        <div class="toolbar">
          <button class="btn gold" onclick="hideAllQuizzesFromStudents()">Clear All Quizzes from Student Portals</button>
          <button class="btn light" onclick="show('quizControl')">Open Quiz Control / Reset</button>
        </div>
      </div>`);
    }
  };

  /* Saved Quiz table in Quiz Builder: make delete/hide control clear. */
  window.savedQuizTable = function(){
    const quizzes = state.quizzes || [];
    if(!quizzes.length) return '<div class="empty">No quiz saved yet. Student portals are clear.</div>';
    return `<div class="tableWrap"><table><thead><tr><th>Title</th><th>Class</th><th>Subject</th><th>Questions</th><th>Student Portal</th><th>Action</th></tr></thead><tbody>
      ${quizzes.map(q=>{
        const classText = Array.isArray(q.classNames) ? q.classNames.join(', ') : (q.className || 'ALL');
        return `<tr>
          <td><b>${esc(q.title || 'Untitled Quiz')}</b><br><small>${esc(q.createdAt || '')}</small></td>
          <td>${esc(classText)}</td>
          <td>${esc(q.subject || '')}</td>
          <td>${(q.questions || []).length}</td>
          <td><span class="quizStatusPill ${q.status === 'Published' ? 'live' : 'hidden'}">${q.status === 'Published' ? 'Visible' : 'Hidden'}</span></td>
          <td>
            ${q.status === 'Published'
              ? `<button class="btn light" onclick="hideSelectedQuiz('${q.id}')">Hide from Students</button>`
              : `<button class="btn green" onclick="publishSelectedQuiz('${q.id}')">Publish</button>`}
            <button class="btn red" onclick="deleteSelectedQuizEverywhere('${q.id}')">Delete</button>
          </td>
        </tr>`;
      }).join('')}
    </tbody></table></div>`;
  };

  setTimeout(() => {
    if(role === 'admin') buildNav();
  }, 600);
})();
</script>


<script>
/* STUDENT AND CLASS MANAGEMENT UPDATE */
(function(){
  function ensureArrays(){
    state.classes = state.classes || [];
    state.subjects = state.subjects || [
      {name:'Additional Mathematics', classes:['1 AGRIC','1 SCIENCE']},
      {name:'Mathematics', classes:['1H2A','1 G3B']}
    ];
    state.students = state.students || [];
  }
  ensureArrays();

  function getSubjectNames(){ return (state.subjects || []).map(s => s.name); }

  function addClassToSubject(className, subjectName){
    ensureArrays();
    if(!state.classes.includes(className)) state.classes.push(className);
    let subj = state.subjects.find(s => s.name === subjectName);
    if(!subj){
      subj = {name: subjectName, classes: []};
      state.subjects.push(subj);
    }
    state.subjects.forEach(s => {
      if(s.name !== subjectName) s.classes = (s.classes || []).filter(c => c !== className);
    });
    subj.classes = subj.classes || [];
    if(!subj.classes.includes(className)) subj.classes.push(className);
  }

  function classSubjectOptions(selected){
    return getSubjectNames().map(s => `<option value="${esc(s)}" ${selected===s?'selected':''}>${esc(s)}</option>`).join('');
  }

  function classOptionsForSelect(selected){
    return (state.classes || []).map(c => `<option value="${esc(c)}" ${selected===c?'selected':''}>${esc(c)}</option>`).join('');
  }

  function makeStudentCode(className){
    const prefix = String(className || 'CLASS').replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,8) || 'STU';
    const n = state.students.filter(s => s.className === className).length + 1;
    return prefix + '-' + String(n).padStart(3,'0');
  }

  function newStudentId(){
    return 'stu_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
  }

  function normalizeName(x){
    return String(x||'').trim().replace(/\s+/g,' ').toUpperCase();
  }

  window.addNewClassFromAdmin = function(){
    const name = normalizeName($('newClassName')?.value);
    const subject = $('newClassSubject')?.value || 'Mathematics';
    if(!name) return alert('Type the class name first.');
    addClassToSubject(name, subject);
    save();
    toast('Class added: ' + name);
    students();
  };

  window.addSingleStudentFromAdmin = function(){
    const name = normalizeName($('singleStudentName')?.value);
    const className = $('singleStudentClass')?.value;
    const phone = $('singleStudentPhone')?.value.trim() || '';
    if(!name) return alert('Type the student name.');
    if(!className) return alert('Select the class.');
    const stu = {
      id: newStudentId(),
      name,
      code: makeStudentCode(className),
      className,
      status:'Active',
      phone,
      password: 'AM' + Math.random().toString(36).slice(2,6).toUpperCase()
    };
    state.students.push(stu);
    save();
    toast('Student added: ' + name);
    students();
  };

  window.bulkImportStudentsFromAdmin = function(){
    const className = $('bulkImportClass')?.value;
    const text = $('bulkNamesBox')?.value || '';
    if(!className) return alert('Select the class.');
    const names = text.split(/\r?\n|,/).map(normalizeName).filter(Boolean);
    if(!names.length) return alert('Paste or type the names first.');
    let added = 0;
    names.forEach(name => {
      const exists = state.students.some(s => s.className === className && s.name.toLowerCase() === name.toLowerCase());
      if(!exists){
        state.students.push({
          id:newStudentId(),
          name,
          code:makeStudentCode(className),
          className,
          status:'Active',
          phone:'',
          password:'AM' + Math.random().toString(36).slice(2,6).toUpperCase()
        });
        added++;
      }
    });
    save();
    toast(added + ' student(s) imported.');
    students();
  };

  window.deleteStudentFromAdmin = function(id){
    const s = student(id);
    if(!s) return;
    if(!confirm('Delete ' + s.name + ' completely? This will also delete this student’s submissions.')) return;
    state.students = state.students.filter(x => x.id !== id);
    state.submissions = (state.submissions || []).filter(x => x.studentId !== id);
    save();
    toast('Student deleted.');
    students();
  };

  window.changeStudentClass = function(id, className){
    const s = student(id);
    if(!s) return;
    s.className = className;
    if(!s.code || confirm('Do you want to update this student code to match the new class?')){
      s.code = makeStudentCode(className);
    }
    save();
    students();
  };

  window.changeStudentName = function(id, name){
    const s = student(id);
    if(!s) return;
    s.name = normalizeName(name);
    save();
  };

  window.removeStudentPhoto = function(id){
    const s = student(id);
    if(!s) return;
    if(!confirm('Remove picture for ' + s.name + '?')) return;
    delete s.photo;
    save();
    toast('Picture removed.');
    if(role === 'admin') students();
    else if(typeof studentHome === 'function') studentHome();
  };

  window.students = function(){
    ensureArrays();
    let cl = $('stuClass')?.value || 'ALL';
    let subj = $('stuSubject')?.value || 'ALL';
    let q = ($('stuSearch')?.value || '').toLowerCase();
    let list = state.students.filter(s=>{
      let okClass = cl==='ALL' || s.className===cl;
      let okSubj = subj==='ALL' || subjectForClass(s.className)===subj;
      let okSearch = !q || s.name.toLowerCase().includes(q) || s.code.toLowerCase().includes(q) || String(s.phone||'').includes(q);
      return okClass && okSubj && okSearch;
    });
    const subjectOptions = state.subjects.map(s=>`<option value="${esc(s.name)}" ${subj===s.name?'selected':''}>${esc(s.name)}</option>`).join('');
    $('view').innerHTML = `
      <div class="card">
        <div class="kicker">Student and class management</div>
        <p class="notice">Use this page to add the fourth class, import a full list of names, add one student manually, delete a student, and change or remove pictures.</p>
      </div>

      <div class="studentManagePanel">
        <h3>Create another class</h3>
        <p>Create a new class and assign it to either Mathematics or Additional Mathematics.</p>
        <div class="grid three">
          <input id="newClassName" class="input" placeholder="Type new class name">
          <select id="newClassSubject" class="select">${classSubjectOptions('Mathematics')}</select>
          <button class="btn green" onclick="addNewClassFromAdmin()">Add Class</button>
        </div>
      </div>

      <div class="studentManagePanel">
        <h3>Add one student manually</h3>
        <div class="grid four">
          <input id="singleStudentName" class="input" placeholder="Student full name">
          <select id="singleStudentClass" class="select">${classOptionsForSelect(state.classes[0] || '')}</select>
          <input id="singleStudentPhone" class="input" placeholder="Telephone number, optional">
          <button class="btn green" onclick="addSingleStudentFromAdmin()">Add Student</button>
        </div>
      </div>

      <div class="studentManagePanel">
        <h3>Bulk import student names</h3>
        <p>Paste all names for the fourth class here. Put one name per line, or separate names with commas.</p>
        <div class="grid two">
          <select id="bulkImportClass" class="select">${classOptionsForSelect(state.classes[0] || '')}</select>
          <textarea id="bulkNamesBox" class="input" style="min-height:110px" placeholder="Paste names here, one per line"></textarea>
        </div>
        <div class="toolbar"><button class="btn gold" onclick="bulkImportStudentsFromAdmin()">Import Names into Selected Class</button></div>
      </div>

      <div class="card">
        <div class="grid four">
          <select id="stuSubject" class="select" onchange="students()"><option value="ALL" ${subj==='ALL'?'selected':''}>All Subjects</option>${subjectOptions}</select>
          <select id="stuClass" class="select" onchange="students()"><option value="ALL" ${cl==='ALL'?'selected':''}>All Classes</option>${classOptionsForSelect(cl)}</select>
          <input id="stuSearch" class="input" oninput="students()" value="${esc(q)}" placeholder="Search name, code, or phone">
          <button class="btn ghost" onclick="downloadStudentsWithPhones && downloadStudentsWithPhones()">Export CSV</button>
        </div>
      </div>

      <div class="card">
        <div class="kicker">Students list</div>
        <div class="tableWrap">
          <table>
            <thead><tr><th>Photo</th><th>Name</th><th>Code</th><th>Class</th><th>Subject</th><th>Telephone</th><th>Password</th><th>Share</th><th>Picture</th><th>Delete</th></tr></thead>
            <tbody>${list.map(s=>`<tr>
              <td>${typeof photoHTML==='function'?photoHTML(s):''}</td>
              <td><input class="input studentEditInput" value="${esc(s.name)}" onchange="changeStudentName('${s.id}',this.value)"></td>
              <td>${esc(s.code || '')}</td>
              <td><select class="select" onchange="changeStudentClass('${s.id}',this.value)">${classOptionsForSelect(s.className)}</select></td>
              <td>${esc(subjectForClass(s.className))}</td>
              <td><input class="input phoneInputSmall" value="${esc(s.phone||'')}" placeholder="024..." onchange="updateStudentPhone && updateStudentPhone('${s.id}',this.value)"></td>
              <td><input class="input passwordInputSmall" value="${esc(s.password||'')}" placeholder="Password" onchange="updateStudentPassword && updateStudentPassword('${s.id}',this.value)"><button class="btn light" style="margin-top:6px" onclick="generateStudentPassword && generateStudentPassword('${s.id}')">Generate</button></td>
              <td><div class="shareButtonGroup"><button class="btn green" onclick="shareStudentPassword && shareStudentPassword('${s.id}')">Share</button><button class="btn ghost" onclick="copyStudentPassword && copyStudentPassword('${s.id}')">Copy</button></div></td>
              <td><div class="studentActionBar">
                <button class="btn light" onclick="chooseStudentPhoto('${s.id}','students',false)">Upload/Change</button>
                <button class="btn gold" onclick="chooseStudentPhoto('${s.id}','students',true)">Camera</button>
                <button class="btn ghost" onclick="removeStudentPhoto('${s.id}')">Remove</button>
              </div></td>
              <td><button class="btn red" onclick="deleteStudentFromAdmin('${s.id}')">Delete</button></td>
            </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`;
  };

  window.studentHome = function(){
    const s = student(currentStudentId);
    const subject = s ? subjectForClass(s.className) : '';
    const quizzes = typeof availableQuizzes === 'function' ? availableQuizzes() : [];
    $('view').innerHTML = `
      <div class="mobileStudentHeader">
        <h2>${esc(s?.name || 'Student')}</h2>
        <p><b>Class:</b> ${esc(s?.className || '')}</p>
        <p><b>Subject:</b> ${esc(subject)}</p>
        <p><b>Code:</b> ${esc(s?.code || '')}</p>
      </div>
      <div class="mobilePortalTiles">
        <div class="mobilePortalTile"><span>Available quizzes</span><b>${quizzes.length}</b></div>
        <div class="mobilePortalTile"><span>My subject</span><b style="font-size:16px">${esc(subject)}</b></div>
      </div>
      <div class="card">
        <button class="btn green mobileActionBtn" onclick="show('studentQuizzes')">Open My Quizzes</button>
      </div>
      <div class="card">
        <div class="kicker">My telephone number</div>
        <div class="grid two">
          <input id="studentSelfPhone" class="input" value="${esc(s?.phone || '')}" placeholder="Enter telephone number">
          <button class="btn green" onclick="saveMyTelephoneNumber && saveMyTelephoneNumber()">Save Telephone Number</button>
        </div>
      </div>
      ${state.allowStudentPhotoUpload && s ? `<div class="card">
        <div class="kicker">My picture</div>
        <div class="toolbar">
          <button class="btn light" onclick="chooseStudentPhoto('${s.id}','studentHome',false)">Upload/Change Picture</button>
          <button class="btn gold" onclick="chooseStudentPhoto('${s.id}','studentHome',true)">Take Picture</button>
          <button class="btn ghost" onclick="removeStudentPhoto('${s.id}')">Remove Picture</button>
        </div>
      </div>` : ''}
      <div class="supportFooter">Contact Sir Isaac Boahen for any support.</div>`;
  };

  const previousStudentQuizzesMobile = window.studentQuizzes || studentQuizzes;
  window.studentQuizzes = function(){
    previousStudentQuizzesMobile();
    const view = $('view');
    if(view && !document.getElementById('supportFooterStudentQuiz')){
      view.insertAdjacentHTML('beforeend','<div id="supportFooterStudentQuiz" class="supportFooter">Contact Sir Isaac Boahen for any support.</div>');
    }
  };

  setTimeout(()=>{ if(role === 'admin') buildNav && buildNav(); }, 500);
})();
</script>


<script>
/* Mobile display helper: no app logic is changed. */
(function(){
  function applyMobileClass(){
    document.body.classList.toggle('phone-view', window.innerWidth <= 820);
  }
  window.addEventListener('resize', applyMobileClass);
  document.addEventListener('DOMContentLoaded', applyMobileClass);
  setTimeout(applyMobileClass, 200);
})();
</script>
